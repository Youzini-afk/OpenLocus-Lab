name: bea-v1-p4h-disjoint-scheduler-validation

# BEA-v1-P4H Disjoint Latency-Aware Retrieval Scheduler Validation
# (manual opt-in). MANUAL ONLY via workflow_dispatch. Does NOT run on
# PR/push. Uses no model/provider secrets. Regenerates the FD1 private
# decomposition under /tmp, validates the replay report, runs the P4H
# aggregate-only validator, and uploads only the public aggregate report.
#
# P4H is an empirical heldout validation of the frozen BEA-v1-P4 scheduler
# from checkpoint f0e99ca. It does not tune thresholds, add query anchors,
# change selectors/rerankers, or use latency in candidate relevance scoring.

on:
  workflow_dispatch:
    inputs:
      enable_external_benchmark_network:
        description: 'Allow real external benchmark + repository network access for FD1 replay + P4H validation (no model/provider secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: bea-v1-p4h-disjoint-scheduler-validation-${{ github.ref }}-${{ inputs.enable_external_benchmark_network }}
  cancel-in-progress: false

jobs:
  bea-v1-p4h-disjoint-scheduler-validation:
    name: bea-v1-p4h-disjoint-scheduler-validation
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve inputs
        id: resolve
        run: |
          enable_network="${{ inputs.enable_external_benchmark_network }}"
          [[ "$enable_network" == "true" ]] && enable_network="true" || enable_network="false"
          echo "enable_network=$enable_network" >> "$GITHUB_OUTPUT"

      - name: Build OpenLocus CLI (release)
        run: cargo build --locked --release -p openlocus-cli

      - name: py_compile BEA-v1-P4H evaluator
        run: python3 -m py_compile eval/bea_v1_p4h_disjoint_scheduler_validation.py

      - name: py_compile BEA-FD1 evaluator
        run: python3 -m py_compile eval/bea_fd1_failure_decomposition.py

      - name: BEA-v1-P4H self-test (no network)
        run: python3 eval/bea_v1_p4h_disjoint_scheduler_validation.py --self-test

      - name: BEA-FD1 self-test (no network)
        run: python3 eval/bea_fd1_failure_decomposition.py --self-test

      - name: Regenerate FD1 private decomposition (only when explicitly enabled)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        run: |
          fd1_private_dir="/tmp/bea_v1_p4h_fd1_private_${GITHUB_RUN_ID:-manual}"
          fd1_replay_report="/tmp/bea_v1_p4h_fd1_replay_report_${GITHUB_RUN_ID:-manual}.json"
          rm -rf "$fd1_private_dir"
          mkdir -p "$fd1_private_dir"
          python3 eval/bea_fd1_failure_decomposition.py \
            --enable-external-benchmark-network \
            --private-decomposition-dir "$fd1_private_dir" \
            --openlocus target/release/openlocus \
            --out "$fd1_replay_report"
          jsonl_path="$fd1_private_dir/bea_fd1.decomposition.jsonl"
          if [[ ! -f "$jsonl_path" ]]; then
            echo "ERROR: FD1 private decomposition JSONL not found" >&2
            exit 1
          fi
          row_count=$(wc -l < "$jsonl_path")
          if [[ "$row_count" -ne 86040 ]]; then
            echo "ERROR: expected 86040 FD1 private decomposition rows, got $row_count" >&2
            exit 1
          fi
          if [[ ! -f "$fd1_replay_report" ]]; then
            echo "ERROR: FD1 replay report not found" >&2
            exit 1
          fi
          python3 - "$fd1_replay_report" <<'PY'
          import json, sys
          path = sys.argv[1]
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          failures = []
          if report.get("schema_version") != "bea_fd1_failure_decomposition.v1":
              failures.append(f"schema_version={report.get('schema_version')!r}")
          if report.get("status") != "bea_fd1_decomposition_pass":
              failures.append(f"status={report.get('status')!r}")
          if report.get("records_decomposed") != 239:
              failures.append(f"records_decomposed={report.get('records_decomposed')!r}")
          manifest = report.get("private_decomposition_manifest", {})
          if manifest.get("schema_version") != "bea_fd1_private_decomposition.v1":
              failures.append(f"manifest.schema_version={manifest.get('schema_version')!r}")
          if manifest.get("record_count") != 86040:
              failures.append(f"manifest.record_count={manifest.get('record_count')!r}")
          if manifest.get("records_written") is not True:
              failures.append("manifest.records_written is not true")
          if manifest.get("path_publicly_serialized") is not False:
              failures.append("manifest.path_publicly_serialized is not false")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("forbidden_scan.status is not pass")
          with open("artifacts/bea_fd1_failure_decomposition/bea_fd1_failure_decomposition_report.json", encoding="utf-8") as f:
              committed = json.load(f)
          committed_hash = committed.get("private_decomposition_manifest", {}).get("manifest_hash", "")
          replay_hash = manifest.get("manifest_hash", "")
          if not committed_hash or replay_hash != committed_hash:
              failures.append("manifest_hash mismatch")
          if failures:
              for failure in failures:
                  print(f"ERROR: {failure}", file=sys.stderr)
              sys.exit(1)
          print("FD1 replay report validation passed.")
          PY
          echo "fd1_private_jsonl=$jsonl_path" >> "$GITHUB_ENV"
          echo "fd1_replay_report=$fd1_replay_report" >> "$GITHUB_ENV"

      - name: BEA-v1-P4H disjoint scheduler validation (only when FD1 replay succeeded)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        run: |
          report_path="$RUNNER_TEMP/bea_v1_p4h_disjoint_scheduler_validation_report.json"
          python3 eval/bea_v1_p4h_disjoint_scheduler_validation.py \
            --enable-external-benchmark-network \
            --openlocus target/release/openlocus \
            --fd1-artifact artifacts/bea_fd1_failure_decomposition/bea_fd1_failure_decomposition_report.json \
            --fd1-private-decomposition-jsonl "$fd1_private_jsonl" \
            --fd1-replay-artifact "$fd1_replay_report" \
            --out "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: Upload BEA-v1-P4H prevalidation aggregate report (aggregate only)
        if: ${{ always() && steps.resolve.outputs.enable_network == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: bea-v1-p4h-disjoint-scheduler-validation-prevalidation-${{ github.run_id }}
          path: ${{ runner.temp }}/bea_v1_p4h_disjoint_scheduler_validation_report.json
          retention-days: 7
          if-no-files-found: ignore
          include-hidden-files: false

      - name: BEA-v1-P4H no-op when network not enabled
        if: ${{ steps.resolve.outputs.enable_network != 'true' }}
        run: |
          report_path="$RUNNER_TEMP/bea_v1_p4h_disjoint_scheduler_validation_report.json"
          python3 eval/bea_v1_p4h_disjoint_scheduler_validation.py --out "$report_path"
          status=$(python3 -c "import json; print(json.load(open('$report_path'))['status'])")
          if [[ "$status" != "unavailable_with_reason" ]]; then
            echo "WARNING: expected unavailable_with_reason for no-network default, got $status" >&2
          fi
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: Validate BEA-v1-P4H report (fail-closed)
        env:
          REPORT_PATH: ${{ runner.temp }}/bea_v1_p4h_disjoint_scheduler_validation_report.json
          ENABLE_NETWORK: ${{ steps.resolve.outputs.enable_network }}
        run: |
          python3 - <<'PY'
          import json, os, sys
          path = os.environ["REPORT_PATH"]
          enable_network = os.environ.get("ENABLE_NETWORK") == "true"
          if not os.path.isfile(path):
              print("ERROR: report not found", file=sys.stderr); sys.exit(1)
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          failures = []
          status = report.get("status")
          allowed = {
              "bea_v1_p4h_disjoint_scheduler_validation_pass",
              "no_go_p4h_insufficient_denominator",
              "no_go_p4h_reach_not_replicated",
              "no_go_p4h_latency_not_fixed",
              "no_go_p4h_cost_exceeded",
              "no_go_p4h_policy_degenerate",
              "unavailable_with_reason",
          }
          if status not in allowed:
              failures.append(f"unexpected status: {status!r}")
          if enable_network and status in {"unavailable_with_reason", "no_go_p4h_replay_mismatch"}:
              failures.append(f"network-enabled run cannot be CI-valid with status {status!r}")
          if not enable_network and status != "unavailable_with_reason":
              failures.append(f"expected unavailable_with_reason without network, got {status!r}")
          if report.get("schema_version") != "bea_v1_p4h_disjoint_scheduler_validation.v1":
              failures.append("unexpected schema_version")
          if report.get("claim_level") != "bea_v1_p4h_disjoint_scheduler_validation_only":
              failures.append("unexpected claim_level")
          if report.get("phase") != "BEA-v1-P4H":
              failures.append("unexpected phase")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("expected forbidden_scan.status=pass")
          if report.get("self_test_passed") is not True:
              failures.append("expected self_test_passed=true")
          expected_arms = [
              "current_bea_candidate_pool_replay",
              "p2_depth_only_reference",
              "p3_constrained_depth_policy_reference",
              "p4_latency_aware_action_scheduler_frozen",
          ]
          if report.get("policy_arms") != expected_arms:
              failures.append(f"unexpected policy_arms: {report.get('policy_arms')!r}")
          for flag in ("aggregate_only_public_artifact", "records_only_public_artifact",
                       "diagnostic_only", "frozen_p4_scheduler_equivalence_explicit",
                       "bea_v1_p4h_audit_evaluator_no_provider_calls",
                       "bea_v1_p4h_audit_evaluator_no_selector_executed",
                       "bea_v1_p4h_audit_evaluator_latency_not_in_relevance"):
              if report.get(flag) is not True:
                  failures.append(f"expected {flag}=true")
          for flag in ("provider_calls_made", "remote_provider_calls_made",
                       "gold_labels_used_for_query_construction",
                       "gold_labels_used_for_selection", "gold_labels_used_for_policy",
                       "latency_in_candidate_relevance", "query_anchors_used_in_p4_arm",
                       "selector_or_reranker_changed", "default_should_change",
                       "runtime_behavior_changed", "promotion_ready", "method_winner_claimed",
                       "fd2b_executed", "fd2c_executed", "p5_executed", "b16k_executed"):
              if report.get(flag) is not False:
                  failures.append(f"expected {flag}=false, got {report.get(flag)!r}")
          if report.get("denominator_source_protocol") != "raw_external_full_frame_disjoint_success_quota_scan.v1":
              failures.append("unexpected denominator_source_protocol")
          if report.get("prior_fd1_denominator_reused") is not False:
              failures.append("expected prior_fd1_denominator_reused=false")
          if report.get("prior_raw_windows_excluded") is not True:
              failures.append("expected prior_raw_windows_excluded=true")
          required_tables = ("source_run_records", "denominator_records",
              "denominator_scan_records",
              "prior_raw_exclusion_records",
              "arm_reach_records", "arm_delta_records", "arm_cost_records",
              "arm_action_records", "channel_action_records",
              "scheduler_stop_reason_records", "latency_decomposition_records",
              "efficiency_records", "reach_bucket_records", "rank_band_records",
              "cost_safety_records", "subgroup_safety_records",
              "rank_budget_audit_records",
              "stop_go_records", "gate_records", "private_manifest_records",
              "failure_category_count_records")
          for key in required_tables:
              if not isinstance(report.get(key), list):
                  failures.append(f"expected {key} to be a list")
          if enable_network:
              scan_expected_rows = 0
              for row in report.get("denominator_scan_records") or []:
                  if isinstance(row, dict):
                      if row.get("scan_protocol") != "full_frame_disjoint_success_quota":
                          failures.append("expected full-frame disjoint scan_protocol")
                      scan_expected_rows += int(row.get("raw_rows_file_miss_selected", 0) or 0)
                      scan_expected_rows += int(row.get("raw_rows_baseline_reached_excluded", 0) or 0)
                      scan_expected_rows += int(row.get("raw_rows_baseline_error_excluded", 0) or 0)
              if not isinstance(report.get("prior_raw_exclusion_records"), list) or not report.get("prior_raw_exclusion_records"):
                  failures.append("expected prior_raw_exclusion_records")
              manifests = {m.get("manifest_name"): m for m in (report.get("private_manifest_records") or []) if isinstance(m, dict)}
              scan_manifest = manifests.get("bea_v1_p4h_private_denominator_scan_manifest")
              if not scan_manifest:
                  failures.append("expected bea_v1_p4h_private_denominator_scan_manifest")
              elif scan_manifest.get("record_count") != scan_expected_rows:
                  failures.append(f"expected private denominator scan rows {scan_expected_rows}, got {scan_manifest.get('record_count')!r}")
          if enable_network and status != "no_go_p4h_insufficient_denominator":
              if report.get("raw_denominator_scan_attempted") is not True:
                  failures.append("expected raw_denominator_scan_attempted=true")
              if report.get("fd1_private_decomposition_parsed") is not True:
                  failures.append("expected fd1_private_decomposition_parsed=true")
              srr = (report.get("source_run_records") or [{}])[0] if report.get("source_run_records") else {}
              if srr.get("replay_artifact_validated") is not True:
                  failures.append("expected replay_artifact_validated=true")
              expected_rows = report.get("denominator_count", 0) * len(report.get("policy_arms") or [])
              manifest = manifests.get("bea_v1_p4h_private_scheduler_manifest")
              if not manifest:
                  failures.append("expected bea_v1_p4h_private_scheduler_manifest")
              elif manifest.get("record_count") != expected_rows:
                  failures.append(f"expected private scheduler rows {expected_rows}, got {manifest.get('record_count')!r}")
          if enable_network and status == "no_go_p4h_insufficient_denominator":
              if report.get("denominator_count", 0) >= 80:
                  failures.append("insufficient denominator status requires denominator_count < 80")
              if report.get("raw_denominator_scan_attempted") is not True:
                  failures.append("insufficient denominator status requires raw scan attempted")
              if not isinstance(report.get("denominator_scan_records"), list) or not report.get("denominator_scan_records"):
                  failures.append("insufficient denominator status requires denominator_scan_records")
              for row in report.get("failure_category_count_records") or []:
                  if isinstance(row, dict) and row.get("failure_category") == "raw_denominator_clone_failed" and int(row.get("count", 0) or 0) > 0:
                      failures.append("insufficient denominator status cannot include raw_denominator_clone_failed")
          forbidden = ("private_trace_dir", "per_record_reach", "per_record_scheduler",
                       "per_record_channel_actions", "candidate_paths", "candidate_keys",
                       "candidate_list", "candidates", "query_text", "queries",
                       "query_variants", "gold_paths", "gold_files", "snippets",
                       "selected_order", "private_record_id", "record_ids", "repo_url",
                       "base_commit", "fd1_replay_artifact_path", "scheduler_trace_path",
                       "private_scheduler_path", "winner", "calibration", "method_winner",
                       "hard_gates", "failure_category_counts", "arm_reach_counts",
                       "arm_cost_counts", "self_test_checks", "role_proxy_used")
          for key in forbidden:
              if key in report:
                  failures.append(f"forbidden field present: {key}")
          if failures:
              print("BEA-v1-P4H report validation FAILED:", file=sys.stderr)
              for failure in failures:
                  print(f"  - {failure}", file=sys.stderr)
              sys.exit(1)
          print("BEA-v1-P4H report validation passed.")
          print(f"  status={status}")
          print(f"  denominator_count={report.get('denominator_count')}")
          sgr = (report.get("stop_go_records") or [{}])[0] if report.get("stop_go_records") else {}
          print(f"  stop_go_decision={sgr.get('stop_go_decision')}")
          print(f"  self_test_checks_total={report.get('self_test_checks_total')}")
          PY

      - name: Validate docs i18n mirror
        run: python3 scripts/validate_docs_i18n.py

      - name: Check working tree whitespace
        run: git diff --check

      - name: Upload BEA-v1-P4H aggregate report (aggregate only)
        uses: actions/upload-artifact@v4
        with:
          name: bea-v1-p4h-disjoint-scheduler-validation-report-${{ github.run_id }}
          path: ${{ runner.temp }}/bea_v1_p4h_disjoint_scheduler_validation_report.json
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: false
