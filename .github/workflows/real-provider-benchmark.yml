name: real-provider-benchmark

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Real-provider stage to run'
        required: false
        default: 'all_smoke'
        type: choice
        options:
          - p2_embedding
          - p3_quiver_readiness
          - p4_anchor_proto
          - p5_llm_stress
          - p20_llm_large
          - p21_embedding_context
          - p21_dense_hybrid
          - p21_llm_rich
          - all_smoke
      enable_remote_models:
        description: 'Allow real embedding / LLM providers from production environment'
        required: false
        default: false
        type: boolean
      dataset:
        description: 'Dataset source for the smoke run'
        required: false
        default: 'self_test'
        type: choice
        options:
          - self_test
          - ci_smoke
      repo_id:
        description: 'CI corpus repo id when dataset=ci_smoke'
        required: false
        default: 'py_flask'
      views:
        description: 'Comma-separated embedding views/strategies; P21 allows rich context strategies on public/opt-in runs'
        required: false
        default: 'path_plus_symbol'
      embedding_model:
        description: 'Allowed embedding model override for remote runs'
        required: false
        default: 'Qwen/Qwen3-Embedding-8B'
        type: choice
        options:
          - Qwen/Qwen3-Embedding-8B
          - Qwen/Qwen3-Embedding-4B
          - Qwen/Qwen3-Embedding-0.6B
          - BAAI/bge-m3
      llm_model:
        description: 'Optional LLM model override for remote LLM stages; empty uses OPENLOCUS_LLM_MODEL repo variable'
        required: false
        default: ''
      llm_output_mode:
        description: 'P21-G3L structured output mode for LLM rich candidate runs'
        required: false
        default: 'json_object'
        type: choice
        options:
          - prompt_only
          - json_object
          - json_schema_strict
          - tool_call
      max_tasks:
        description: 'Task/query cap for smoke runs'
        required: false
        default: '3'
      task_sample_mode:
        description: 'Task sampling mode for P21 stages'
        required: false
        default: 'prefix'
        type: choice
        options:
          - prefix
          - round_robin_public_buckets
      max_records:
        description: 'Record cap for embedding/index diagnostics'
        required: false
        default: '40'
      max_files_per_repo:
        description: 'File traversal cap for public corpus runs'
        required: false
        default: '80'
      max_stress_tasks:
        description: 'P5 stress task cap'
        required: false
        default: '24'

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: real-provider-benchmark-${{ github.ref }}-${{ inputs.stage }}-${{ inputs.dataset }}-${{ inputs.repo_id }}-${{ inputs.embedding_model }}-${{ inputs.llm_model }}-${{ inputs.llm_output_mode }}-${{ inputs.task_sample_mode }}
  cancel-in-progress: false

jobs:
  real-provider:
    name: ${{ inputs.stage }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: production
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build OpenLocus CLI
        run: cargo build --locked -p openlocus-cli

      - name: Plan real-provider run
        id: plan
        env:
          INPUT_STAGE: ${{ inputs.stage }}
          INPUT_ENABLE_REMOTE: ${{ inputs.enable_remote_models }}
          INPUT_DATASET: ${{ inputs.dataset }}
          INPUT_REPO_ID: ${{ inputs.repo_id }}
          INPUT_VIEWS: ${{ inputs.views }}
          INPUT_EMBEDDING_MODEL: ${{ inputs.embedding_model }}
          INPUT_LLM_MODEL: ${{ inputs.llm_model }}
          INPUT_LLM_OUTPUT_MODE: ${{ inputs.llm_output_mode }}
          INPUT_MAX_TASKS: ${{ inputs.max_tasks }}
          INPUT_TASK_SAMPLE_MODE: ${{ inputs.task_sample_mode }}
          INPUT_MAX_RECORDS: ${{ inputs.max_records }}
          INPUT_MAX_FILES_PER_REPO: ${{ inputs.max_files_per_repo }}
          INPUT_MAX_STRESS_TASKS: ${{ inputs.max_stress_tasks }}
          VAR_EMBEDDING_PROVIDER: ${{ vars.OPENLOCUS_EMBEDDING_PROVIDER }}
          VAR_EMBEDDING_MODEL: ${{ vars.OPENLOCUS_EMBEDDING_MODEL }}
          VAR_EMBEDDING_DIMENSIONS: ${{ vars.OPENLOCUS_EMBEDDING_DIMENSIONS }}
          VAR_LLM_PROVIDER: ${{ vars.OPENLOCUS_LLM_PROVIDER }}
          VAR_LLM_MODEL: ${{ vars.OPENLOCUS_LLM_MODEL }}
          VAR_REMOTE_DATA_LEVEL: ${{ vars.OPENLOCUS_REMOTE_DATA_LEVEL }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          allowed_stages = {"p2_embedding", "p3_quiver_readiness", "p4_anchor_proto", "p5_llm_stress", "p20_llm_large", "p21_embedding_context", "p21_dense_hybrid", "p21_llm_rich", "all_smoke"}
          allowed_datasets = {"self_test", "ci_smoke"}
          r32_allowed_views = {"path_plus_symbol"}
          p21_allowed_views = {
              "all",
              "atom_path_symbol", "atom_signature", "atom_signature_doc", "atom_matched_lines",
              "atom_body_window", "atom_comment_doc", "atom_test_intent", "atom_config_route",
              "pack1_metadata", "pack2_evidence_sketch", "pack3_local_code", "pack5_contrastive",
          }
          provider_aliases = {"openai": "openai-compatible", "openai_compatible": "openai-compatible", "openai-compatible": "openai-compatible"}
          allowed_embedding_models = {
              "Qwen/Qwen3-Embedding-8B": {"dimensions": 4096, "send_dimensions": "1"},
              "Qwen/Qwen3-Embedding-4B": {"dimensions": 2560, "send_dimensions": "1"},
              "Qwen/Qwen3-Embedding-0.6B": {"dimensions": 1024, "send_dimensions": "1"},
              "BAAI/bge-m3": {"dimensions": 1024, "send_dimensions": "0"},
          }
          allowed_llm_output_modes = {"prompt_only", "json_object", "json_schema_strict", "tool_call"}
          allowed_task_sample_modes = {"prefix", "round_robin_public_buckets"}

          def getenv(name: str, default: str = "") -> str:
              value = os.environ.get(name, default)
              if any(ch in value for ch in "\r\n\0"):
                  raise SystemExit(f"{name} contains a disallowed control character")
              return value

          def positive_int(name: str, upper: int) -> int:
              raw = getenv(name)
              if not re.fullmatch(r"[1-9][0-9]*", raw):
                  raise SystemExit(f"{name} must be a positive integer")
              value = int(raw)
              if value > upper:
                  raise SystemExit(f"{name} exceeds cap {upper}")
              return value

          stage = getenv("INPUT_STAGE", "all_smoke")
          if stage not in allowed_stages:
              raise SystemExit(f"unsupported stage: {stage}")
          remote_enabled = getenv("INPUT_ENABLE_REMOTE", "false").lower() == "true"
          dataset = getenv("INPUT_DATASET", "self_test")
          if dataset not in allowed_datasets:
              raise SystemExit(f"unsupported dataset: {dataset}")
          repo_id = getenv("INPUT_REPO_ID", "py_flask")
          if not re.fullmatch(r"[A-Za-z0-9_-]{1,64}", repo_id):
              raise SystemExit("repo_id must match [A-Za-z0-9_-]{1,64}")
          views = getenv("INPUT_VIEWS", "path_plus_symbol")
          if stage in {"p21_dense_hybrid", "p21_llm_rich"} and views == "path_plus_symbol":
              views = "pack2_evidence_sketch,atom_signature"
          view_list = [view.strip() for view in views.split(",") if view.strip()]
          allowed_views = p21_allowed_views if stage in {"p21_embedding_context", "p21_dense_hybrid", "p21_llm_rich"} else r32_allowed_views
          if not view_list or any(view not in allowed_views for view in view_list):
              raise SystemExit("unsupported views/strategies for selected stage")
          views = ",".join(view_list)
          max_tasks = positive_int("INPUT_MAX_TASKS", 100)
          max_records = positive_int("INPUT_MAX_RECORDS", 1000)
          max_files_per_repo = positive_int("INPUT_MAX_FILES_PER_REPO", 3000)
          max_stress_tasks = positive_int("INPUT_MAX_STRESS_TASKS", 100)
          llm_output_mode = getenv("INPUT_LLM_OUTPUT_MODE", "json_object")
          if llm_output_mode not in allowed_llm_output_modes:
              raise SystemExit(f"unsupported llm_output_mode: {llm_output_mode}")
          task_sample_mode = getenv("INPUT_TASK_SAMPLE_MODE", "prefix")
          if task_sample_mode not in allowed_task_sample_modes:
              raise SystemExit(f"unsupported task_sample_mode: {task_sample_mode}")

          if remote_enabled:
              llm_stages = {"p5_llm_stress", "p20_llm_large", "p21_llm_rich", "all_smoke"}
              embedding_provider = provider_aliases.get(getenv("VAR_EMBEDDING_PROVIDER", "openai_compatible"))
              if not embedding_provider:
                  raise SystemExit("unsupported embedding provider variable")
              llm_provider = "unused"
              if stage in llm_stages:
                  llm_provider = provider_aliases.get(getenv("VAR_LLM_PROVIDER", "openai_compatible"))
                  if not llm_provider:
                      raise SystemExit("unsupported llm provider variable")
              embedding_model = getenv("INPUT_EMBEDDING_MODEL") or getenv("VAR_EMBEDDING_MODEL")
              if embedding_model not in allowed_embedding_models:
                  raise SystemExit("unsupported embedding model override")
              embedding_dimensions = allowed_embedding_models[embedding_model]["dimensions"]
              embedding_send_dimensions = allowed_embedding_models[embedding_model]["send_dimensions"]
              if not embedding_model:
                  raise SystemExit("missing OPENLOCUS_EMBEDDING_MODEL variable")
              if stage in llm_stages:
                  llm_model = getenv("INPUT_LLM_MODEL").strip() or getenv("VAR_LLM_MODEL")
                  if not llm_model:
                      raise SystemExit("missing OPENLOCUS_LLM_MODEL variable")
                  if not re.fullmatch(r"[A-Za-z0-9_./:@+\-\[\] ]{1,160}", llm_model):
                      raise SystemExit("llm_model contains unsupported characters")
              else:
                  llm_model = getenv("INPUT_LLM_MODEL").strip() or "unused"
          else:
              embedding_provider = "local_token_hash"
              llm_provider = "offline_deterministic"
              embedding_model = "local_token_hash"
              embedding_dimensions = 64
              embedding_send_dimensions = "0"
              llm_model = "offline_deterministic"

          Path("artifacts/real_provider_ci").mkdir(parents=True, exist_ok=True)
          Path("docs/real-provider-ci").mkdir(parents=True, exist_ok=True)
          outputs = {
              "stage": stage,
              "dataset": dataset,
              "repo_id": repo_id,
              "views": views,
              "max_tasks": str(max_tasks),
              "task_sample_mode": task_sample_mode,
              "max_records": str(max_records),
              "max_files_per_repo": str(max_files_per_repo),
              "max_stress_tasks": str(max_stress_tasks),
              "embedding_provider": embedding_provider,
              "embedding_model": embedding_model,
              "embedding_dimensions": str(embedding_dimensions),
              "embedding_send_dimensions": embedding_send_dimensions,
              "llm_provider": llm_provider,
              "llm_model": llm_model,
              "llm_output_mode": llm_output_mode,
              "task_sample_mode": task_sample_mode,
              "allow_remote": "1" if remote_enabled else "0",
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              for key, value in outputs.items():
                  f.write(f"{key}={value}\n")
          plan = {
              "schema_version": "real-provider-ci-plan-v1",
              "stage": stage,
              "dataset": dataset,
              "repo_id": repo_id,
              "remote_enabled": remote_enabled,
              "embedding_provider": embedding_provider,
              "embedding_model": embedding_model,
              "embedding_dimensions": embedding_dimensions,
              "embedding_send_dimensions": embedding_send_dimensions,
              "llm_provider": llm_provider,
              "llm_model": llm_model,
              "llm_output_mode": llm_output_mode,
              "views": views,
              "max_tasks": max_tasks,
              "max_records": max_records,
              "max_files_per_repo": max_files_per_repo,
              "max_stress_tasks": max_stress_tasks,
              "provider_url_or_key_committed": False,
              "promotion_ready": False,
              "default_should_change": False,
          }
          Path("artifacts/real_provider_ci/plan.json").write_text(json.dumps(plan, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Prepare public CI corpus dataset
        if: ${{ steps.plan.outputs.dataset == 'ci_smoke' }}
        env:
          REPO_ID: ${{ steps.plan.outputs.repo_id }}
          MAX_TASKS: ${{ steps.plan.outputs.max_tasks }}
          TASK_SAMPLE_MODE: ${{ steps.plan.outputs.task_sample_mode }}
          MAX_FILES_PER_REPO: ${{ steps.plan.outputs.max_files_per_repo }}
        run: |
          work_root="$RUNNER_TEMP/openlocus-real-provider-work"
          mkdir -p "$work_root/corpus" "$work_root/tasks"
          python3 eval/ci_clone_and_lock_repo.py \
            --manifest eval/ci_repos/openlocus-ci-repos-v1.yaml \
            --repo-id "$REPO_ID" \
            --out-root "$work_root/corpus" \
            --lock-out "$work_root/repo-lock.json" \
            --max-indexed-bytes 3000000
          gen_max_tasks="$MAX_TASKS"
          if [[ "$TASK_SAMPLE_MODE" == "round_robin_public_buckets" ]]; then
            gen_max_tasks=$(( MAX_TASKS * 8 ))
            if [[ "$gen_max_tasks" -lt 80 ]]; then gen_max_tasks=80; fi
            if [[ "$gen_max_tasks" -gt 100 ]]; then gen_max_tasks=100; fi
          fi
          python3 eval/ci_generate_tasks.py \
            --repo-lock "$work_root/repo-lock.json" \
            --out-dir "$work_root/tasks" \
            --max-tasks-per-repo "$gen_max_tasks" \
            --max-files-per-repo "$MAX_FILES_PER_REPO"
          python3 - <<'PY'
          import json
          from pathlib import Path
          allowed = {"test_id", "repo_id", "query", "public_version", "source", "task_bucket", "task_risk_tags"}
          # Resolve via RUNNER_TEMP at runtime to avoid writing temp paths into artifacts.
          import os
          public = Path(os.environ["RUNNER_TEMP"]) / "openlocus-real-provider-work/tasks/tasks/ci_tasks.jsonl"
          for line in public.read_text(encoding="utf-8").splitlines():
              if line.strip() and not set(json.loads(line)) <= allowed:
                  raise SystemExit("CI corpus public tasks leaked private fields")
          print("CI corpus public tasks field scan ok")
          PY

      - name: P2 embedding view bakeoff smoke
        if: ${{ inputs.stage == 'p2_embedding' || inputs.stage == 'all_smoke' }}
        env:
          OPENLOCUS_ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
          OPENLOCUS_EMBEDDING_MODEL: ${{ steps.plan.outputs.embedding_model }}
          OPENLOCUS_EMBEDDING_DIMENSIONS: ${{ steps.plan.outputs.embedding_dimensions }}
          OPENLOCUS_EMBEDDING_SEND_DIMENSIONS: ${{ steps.plan.outputs.embedding_send_dimensions }}
          OPENLOCUS_EMBEDDING_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_BASE_URL || '' }}
          OPENLOCUS_EMBEDDING_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_API_KEY || '' }}
          PROVIDER: ${{ steps.plan.outputs.embedding_provider }}
          DATASET: ${{ steps.plan.outputs.dataset }}
          VIEWS: ${{ steps.plan.outputs.views }}
          MAX_TASKS: ${{ steps.plan.outputs.max_tasks }}
          TASK_SAMPLE_MODE: ${{ steps.plan.outputs.task_sample_mode }}
          MAX_RECORDS: ${{ steps.plan.outputs.max_records }}
          MAX_FILES_PER_REPO: ${{ steps.plan.outputs.max_files_per_repo }}
          ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
        run: |
          cmd=(python3 eval/r32_embedding_view_bakeoff.py --provider "$PROVIDER")
          if [[ "$DATASET" == "self_test" ]]; then
            cmd+=(--self-test)
          else
            cmd+=(--repo-lock "$RUNNER_TEMP/openlocus-real-provider-work/repo-lock.json" --tasks "$RUNNER_TEMP/openlocus-real-provider-work/tasks/tasks/ci_tasks.jsonl" --labels "$RUNNER_TEMP/openlocus-real-provider-work/tasks/labels/ci_labels.jsonl")
          fi
          if [[ "$ALLOW_REMOTE" == "1" ]]; then
            cmd+=(--allow-remote)
          fi
          cmd+=(--views "$VIEWS" --max-tasks "$MAX_TASKS" --max-files-per-repo "$MAX_FILES_PER_REPO" --max-records-per-repo "$MAX_RECORDS" --openlocus target/debug/openlocus --out artifacts/real_provider_ci/p2_embedding_view_bakeoff.json --doc docs/real-provider-ci/p2-embedding-view-bakeoff.md)
          "${cmd[@]}"

      - name: P3 QuIVer readiness smoke
        if: ${{ inputs.stage == 'p3_quiver_readiness' || inputs.stage == 'all_smoke' }}
        env:
          OPENLOCUS_ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
          OPENLOCUS_EMBEDDING_MODEL: ${{ steps.plan.outputs.embedding_model }}
          OPENLOCUS_EMBEDDING_DIMENSIONS: ${{ steps.plan.outputs.embedding_dimensions }}
          OPENLOCUS_EMBEDDING_SEND_DIMENSIONS: ${{ steps.plan.outputs.embedding_send_dimensions }}
          OPENLOCUS_EMBEDDING_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_BASE_URL || '' }}
          OPENLOCUS_EMBEDDING_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_API_KEY || '' }}
          PROVIDER: ${{ steps.plan.outputs.embedding_provider }}
          DATASET: ${{ steps.plan.outputs.dataset }}
          VIEWS: ${{ steps.plan.outputs.views }}
          MAX_TASKS: ${{ steps.plan.outputs.max_tasks }}
          MAX_RECORDS: ${{ steps.plan.outputs.max_records }}
          MAX_FILES_PER_REPO: ${{ steps.plan.outputs.max_files_per_repo }}
          ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
        run: |
          cmd=(python3 eval/r33_quiver_readiness.py --provider "$PROVIDER")
          if [[ "$DATASET" == "self_test" ]]; then
            cmd+=(--self-test)
          else
            cmd+=(--repo-lock "$RUNNER_TEMP/openlocus-real-provider-work/repo-lock.json" --tasks "$RUNNER_TEMP/openlocus-real-provider-work/tasks/tasks/ci_tasks.jsonl")
          fi
          if [[ "$ALLOW_REMOTE" == "1" ]]; then
            cmd+=(--allow-remote)
          fi
          cmd+=(--views "$VIEWS" --max-queries "$MAX_TASKS" --max-files-per-repo "$MAX_FILES_PER_REPO" --max-records "$MAX_RECORDS" --openlocus target/debug/openlocus --out artifacts/real_provider_ci/p3_quiver_readiness.json --doc docs/real-provider-ci/p3-quiver-readiness.md)
          "${cmd[@]}"

      - name: P4 anchor-seeded diagnostic smoke
        if: ${{ inputs.stage == 'p4_anchor_proto' || inputs.stage == 'all_smoke' }}
        env:
          OPENLOCUS_ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
          OPENLOCUS_EMBEDDING_MODEL: ${{ steps.plan.outputs.embedding_model }}
          OPENLOCUS_EMBEDDING_DIMENSIONS: ${{ steps.plan.outputs.embedding_dimensions }}
          OPENLOCUS_EMBEDDING_SEND_DIMENSIONS: ${{ steps.plan.outputs.embedding_send_dimensions }}
          OPENLOCUS_EMBEDDING_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_BASE_URL || '' }}
          OPENLOCUS_EMBEDDING_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_API_KEY || '' }}
          PROVIDER: ${{ steps.plan.outputs.embedding_provider }}
          DATASET: ${{ steps.plan.outputs.dataset }}
          VIEWS: ${{ steps.plan.outputs.views }}
          MAX_TASKS: ${{ steps.plan.outputs.max_tasks }}
          MAX_RECORDS: ${{ steps.plan.outputs.max_records }}
          MAX_FILES_PER_REPO: ${{ steps.plan.outputs.max_files_per_repo }}
          ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
        run: |
          cmd=(python3 eval/r34_r36_quiver_anchor_proto.py --provider "$PROVIDER")
          if [[ "$DATASET" == "self_test" ]]; then
            cmd+=(--self-test)
          else
            cmd+=(--repo-lock "$RUNNER_TEMP/openlocus-real-provider-work/repo-lock.json" --tasks "$RUNNER_TEMP/openlocus-real-provider-work/tasks/tasks/ci_tasks.jsonl" --labels "$RUNNER_TEMP/openlocus-real-provider-work/tasks/labels/ci_labels.jsonl")
          fi
          if [[ "$ALLOW_REMOTE" == "1" ]]; then
            cmd+=(--allow-remote)
          fi
          cmd+=(--views "$VIEWS" --max-tasks "$MAX_TASKS" --max-files-per-repo "$MAX_FILES_PER_REPO" --max-records "$MAX_RECORDS" --bq-limit 20 --openlocus target/debug/openlocus --out artifacts/real_provider_ci/p4_quiver_anchor_proto.json --doc docs/real-provider-ci/p4-quiver-anchor-proto.md)
          "${cmd[@]}"

      - name: P5 LLM derived/stress smoke
        if: ${{ inputs.stage == 'p5_llm_stress' || inputs.stage == 'all_smoke' }}
        env:
          OPENLOCUS_ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
          OPENLOCUS_LLM_MODEL: ${{ steps.plan.outputs.llm_model }}
          OPENLOCUS_LLM_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_LLM_BASE_URL || '' }}
          OPENLOCUS_LLM_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_LLM_API_KEY || '' }}
          PROVIDER: ${{ steps.plan.outputs.llm_provider }}
          DATASET: ${{ steps.plan.outputs.dataset }}
          MAX_TASKS: ${{ steps.plan.outputs.max_tasks }}
          MAX_RECORDS: ${{ steps.plan.outputs.max_records }}
          MAX_FILES_PER_REPO: ${{ steps.plan.outputs.max_files_per_repo }}
          MAX_STRESS_TASKS: ${{ steps.plan.outputs.max_stress_tasks }}
          ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
        run: |
          cmd=(python3 eval/r37_r38_llm_derived_stress.py --provider "$PROVIDER")
          if [[ "$DATASET" == "self_test" ]]; then
            cmd+=(--self-test)
          else
            cmd+=(--repo-lock "$RUNNER_TEMP/openlocus-real-provider-work/repo-lock.json" --tasks "$RUNNER_TEMP/openlocus-real-provider-work/tasks/tasks/ci_tasks.jsonl")
          fi
          if [[ "$ALLOW_REMOTE" == "1" ]]; then
            cmd+=(--allow-remote)
          fi
          cmd+=(--max-tasks "$MAX_TASKS" --max-files-per-repo "$MAX_FILES_PER_REPO" --max-records "$MAX_RECORDS" --max-stress-tasks "$MAX_STRESS_TASKS" --openlocus target/debug/openlocus --derived-out artifacts/real_provider_ci/p5_llm_derived_views.jsonl --stress-tasks-out artifacts/real_provider_ci/p5_llm_stress_public.jsonl --stress-labels-out "$RUNNER_TEMP/p5_llm_stress_labels.private.jsonl" --out artifacts/real_provider_ci/p5_llm_derived_stress.json --doc docs/real-provider-ci/p5-llm-derived-stress.md)
          "${cmd[@]}"

      - name: P21-G1E embedding context atom screening
        if: ${{ inputs.stage == 'p21_embedding_context' }}
        env:
          OPENLOCUS_ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
          OPENLOCUS_EMBEDDING_MODEL: ${{ steps.plan.outputs.embedding_model }}
          OPENLOCUS_EMBEDDING_DIMENSIONS: ${{ steps.plan.outputs.embedding_dimensions }}
          OPENLOCUS_EMBEDDING_SEND_DIMENSIONS: ${{ steps.plan.outputs.embedding_send_dimensions }}
          OPENLOCUS_EMBEDDING_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_BASE_URL || '' }}
          OPENLOCUS_EMBEDDING_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_API_KEY || '' }}
          PROVIDER: ${{ steps.plan.outputs.embedding_provider }}
          DATASET: ${{ steps.plan.outputs.dataset }}
          STRATEGIES: ${{ steps.plan.outputs.views }}
          MAX_TASKS: ${{ steps.plan.outputs.max_tasks }}
          MAX_RECORDS: ${{ steps.plan.outputs.max_records }}
          MAX_FILES_PER_REPO: ${{ steps.plan.outputs.max_files_per_repo }}
          ALLOW_REMOTE: ${{ steps.plan.outputs.allow_remote }}
        run: |
          cmd=(python3 eval/p21_embedding_context.py --provider "$PROVIDER")
