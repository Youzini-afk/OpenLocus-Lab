                          for idx, value in enumerate(obj):
                              p57_walk(value, prefix + str(idx) + ".")
                  p57_walk(data)
              if json_path.name in {"p25_bucket_policy.json", "p30_admission_v3_report.json", "p31_candidate_reach_ceiling_report.json", "p33_anchor_precision_repair_report.json", "p33b_anchor_subtype_calibration_report.json", "p46_candidate_reach_cost_map_report.json", "p47_request_more_context_report.json", "p48_diagnostic_policy_simulator_report.json", "p49_contrastive_candidate_pack_scaffold_report.json", "p50_fixed_suite_validation_report.json", "p52_metadata_local_verifier_scaffold_report.json", "p52a_source_materialization_prerequisite_report.json", "p52b_source_backed_local_verifier_feature_matrix_report.json", "p52c_local_verifier_scoring_simulator_report.json", "p51_llm_span_narrow_2_diagnostic_report.json", "p51b_llm_opt_in_contract_report.json", "p57_generalization_gate_report.json"}:


                  for flag in ["raw_prompts_stored", "raw_query_stored", "raw_responses_stored", "raw_snippets_committed", "raw_snippets_sent_to_provider", "raw_text_stored", "private_labels_committed", "provider_keys_in_artifact", "gold_spans_in_artifact"]:
                      if data.get(flag) is not False:
                          raise SystemExit(f"{json_path} does not keep {flag}=false")
                  banned_keys = {

                      "snippet", "prompt", "prompts", "response", "responses",
                      "query", "raw_query", "gold", "gold_spans", "label", "labels",
                      "private_label", "private_labels", "label_path", "task_id",
                      "candidate_path", "candidate_paths", "candidate_span", "candidate_spans",
                      "candidate_pool", "p31_candidate_pools", "p31_score_gold", "p33b_anchor_subtypes",
                      "p33b_anchor_subtypes_schema",
                      "candidate_id", "candidate_index", "path", "start_line", "end_line", "content_sha",
                      "raw_candidates", "route_features", "source_text",
                      "excerpt", "authorization", "api_key", "provider_key", "base_url",
                  }
                  allowed_safety_keys = {"gold_spans_in_artifact", "raw_query_stored"}
                  def walk(obj, prefix=""):
                      if isinstance(obj, dict):
                          for key, value in obj.items():
                              if key in banned_keys and key not in allowed_safety_keys:
                                  raise SystemExit(f"{json_path} persisted banned key {prefix + key}")
                              walk(value, prefix + key + ".")
                      elif isinstance(obj, list):
                          for idx, value in enumerate(obj):
                              walk(value, prefix + str(idx) + ".")
                  walk(data)
              stress_dataset = data.get("stress_dataset")

              if isinstance(stress_dataset, dict) and stress_dataset.get("private_labels") not in {None, "not_uploaded_in_ci"}:
                  raise SystemExit(f"{json_path} contains a private label artifact path")

          for public_path in [
              pathlib.Path("artifacts/real_provider_ci/p5_llm_stress_public.jsonl"),
              pathlib.Path("artifacts/real_provider_ci/p20_llm_stress_public.jsonl"),
          ]:
              if not public_path.exists():
                  continue
              allowed = {"test_id", "repo_id", "query", "public_version", "source", "task_bucket", "task_risk_tags"}
              for line in public_path.read_text(encoding="utf-8").splitlines():
                  if line.strip() and not set(json.loads(line)) <= allowed:
                      raise SystemExit(f"{public_path} leaked private fields")

          print("real-provider CI artifact validation ok")
          PY

      - name: Upload real-provider artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-provider-${{ inputs.stage }}-${{ github.run_id }}
          path: |
            artifacts/real_provider_ci/plan.json
            artifacts/real_provider_ci/*.json
            artifacts/real_provider_ci/p5_llm_stress_public.jsonl
            artifacts/real_provider_ci/p20_llm_aliases.jsonl
            artifacts/real_provider_ci/p20_llm_stress_public.jsonl
            docs/real-provider-ci/*.md
            !artifacts/real_provider_ci/**/labels/**
            !artifacts/real_provider_ci/**/corpus/**
            !artifacts/real_provider_ci/*label*
            !artifacts/real_provider_ci/*private*
            !**/*private*
            !docs/real-provider-ci/*label*
            !docs/real-provider-ci/*private*
          if-no-files-found: warn
          retention-days: 14
