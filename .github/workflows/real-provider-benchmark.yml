             # P57 Generalization Gate v0: deterministic aggregate-only diagnostic readiness gate.
             python3 eval/p57_generalization_gate.py --p46-report artifacts/real_provider_ci/p46_candidate_reach_cost_map_report.json --p47-report artifacts/real_provider_ci/p47_request_more_context_report.json --p48-report artifacts/real_provider_ci/p48_diagnostic_policy_simulator_report.json --p49-report artifacts/real_provider_ci/p49_contrastive_candidate_pack_scaffold_report.json --p50-report artifacts/real_provider_ci/p50_fixed_suite_validation_report.json --p52-report artifacts/real_provider_ci/p52_metadata_local_verifier_scaffold_report.json --p52a-report artifacts/real_provider_ci/p52a_source_materialization_prerequisite_report.json --p52b-report artifacts/real_provider_ci/p52b_source_backed_local_verifier_feature_matrix_report.json --p52c-report artifacts/real_provider_ci/p52c_local_verifier_scoring_simulator_report.json --p51-report artifacts/real_provider_ci/p51_llm_span_narrow_2_diagnostic_report.json --p51b-report artifacts/real_provider_ci/p51b_llm_opt_in_contract_report.json --out artifacts/real_provider_ci/p57_generalization_gate_report.json --doc docs/real-provider-ci/p57-generalization-gate.md
             rm -f "$P25_RECORDS"

      - name: P20-LS LLM alias/stress harness
