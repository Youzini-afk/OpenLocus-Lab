          "${cmd[@]}"

      - name: Validate artifacts and privacy gates
        env:
          STAGE: ${{ inputs.stage }}
          OPENLOCUS_EMBEDDING_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_BASE_URL || '' }}
          OPENLOCUS_EMBEDDING_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_EMBEDDING_API_KEY || '' }}
          OPENLOCUS_LLM_BASE_URL: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_LLM_BASE_URL || '' }}
          OPENLOCUS_LLM_API_KEY: ${{ steps.plan.outputs.allow_remote == '1' && secrets.OPENLOCUS_LLM_API_KEY || '' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          roots = [pathlib.Path("artifacts/real_provider_ci"), pathlib.Path("docs/real-provider-ci")]
          p5_report = pathlib.Path("artifacts/real_provider_ci/p5_llm_derived_stress.json")
          if p5_report.exists():
              data = json.loads(p5_report.read_text(encoding="utf-8"))
              stress_dataset = data.get("stress_dataset")
              if isinstance(stress_dataset, dict) and "private_labels" in stress_dataset:
                  stress_dataset["private_labels"] = "not_uploaded_in_ci"
                  p5_report.write_text(json.dumps(data, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          secret_values = [
              os.environ.get("OPENLOCUS_EMBEDDING_BASE_URL"),
              os.environ.get("OPENLOCUS_EMBEDDING_API_KEY"),
              os.environ.get("OPENLOCUS_LLM_BASE_URL"),
              os.environ.get("OPENLOCUS_LLM_API_KEY"),
          ]
          secret_values = [value for value in secret_values if value]
          secret_patterns = [
              re.compile(r"sk-[A-Za-z0-9_-]{20,}"),
              re.compile(r"(?i)authorization\s*[:=]"),
              re.compile(r"(?i)bearer\s+[A-Za-z0-9_.-]{20,}"),
              re.compile(r"(?i)(api_key|base_url)\s*[:=]"),
          ]
          violations = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding="utf-8", errors="ignore")
                  if any(value in text for value in secret_values):
                      violations.append(str(path))
                  if any(pattern.search(text) for pattern in secret_patterns):
                      violations.append(str(path))
          if violations:
              raise SystemExit("secret leak in artifacts: " + ", ".join(sorted(set(violations))))

          for json_path in pathlib.Path("artifacts/real_provider_ci").glob("*.json"):
              data = json.loads(json_path.read_text(encoding="utf-8"))
              if data.get("promotion_ready") is not False:
                  raise SystemExit(f"{json_path} does not explicitly keep promotion_ready=false")
              if data.get("default_should_change") is not False:
                  raise SystemExit(f"{json_path} does not explicitly keep default_should_change=false")
              if json_path.name == "p21_dense_hybrid.json":
                  if data.get("provider_status") != "ok":
                      raise SystemExit(f"{json_path} provider_status is not ok")
                  if int(data.get("dense_strategy_success_count", 0)) < 1:
                      raise SystemExit(f"{json_path} has no successful dense strategies")
              if json_path.name == "p21_llm_rich_candidate.json":
                  if data.get("provider_status") not in {"ok", "degraded"}:
                      raise SystemExit(f"{json_path} provider_status is invalid")
                  plan_data = json.loads(pathlib.Path("artifacts/real_provider_ci/plan.json").read_text(encoding="utf-8"))
                  if data.get("requested_output_mode") != plan_data.get("llm_output_mode"):
                      raise SystemExit(f"{json_path} did not honor requested llm_output_mode")
                  if data.get("candidate_info", {}).get("candidate_strategy_available") is not True:
                      raise SystemExit(f"{json_path} candidate strategy was unavailable")
                  if data.get("llm_remote_enabled") is True and data.get("all_pack_file_filters_applied") is not True:
                      raise SystemExit(f"{json_path} did not apply file filters for remote LLM snippets")
                  if data.get("llm_remote_enabled") is True:
                      if data.get("raw_snippets_sent_to_provider") is not True:
                          raise SystemExit(f"{json_path} did not exercise remote LLM snippets")
                      if int(data.get("call_summary", {}).get("packed_candidates_total", 0)) < 1:
                          raise SystemExit(f"{json_path} packed no candidates for remote LLM")
                  if data.get("raw_prompts_stored") is not False or data.get("raw_responses_stored") is not False:
                      raise SystemExit(f"{json_path} persisted raw LLM payloads")
                  for flag in ["raw_snippets_committed", "raw_text_stored", "raw_query_stored", "private_labels_committed"]:
                      if data.get(flag) is not False:
                          raise SystemExit(f"{json_path} does not keep {flag}=false")
                  if data.get("labels_loaded_after_run") is not True or data.get("run_phase_public_only") is not True:
                      raise SystemExit(f"{json_path} violates RUN/SCORE or public-run invariant")
                  # P21 public diagnostics may include sanitized task IDs in
                  # aggregate decision records. Keep this legacy scan scoped to
                  # raw/private payloads; stricter aggregate-only scans run on
                  # P25/P30/P31 reports below.
                  banned_keys = {"snippet", "prompt", "prompts", "response", "responses", "query", "gold", "gold_spans", "private_labels", "label_path", "p31_candidate_pools", "p31_score_gold"}
                  def walk(obj, prefix=""):
                      if isinstance(obj, dict):
                          for key, value in obj.items():
                              if key in banned_keys:
                                  raise SystemExit(f"{json_path} persisted banned key {prefix + key}")
                              walk(value, prefix + key + ".")
                      elif isinstance(obj, list):
                          for idx, value in enumerate(obj):
                              walk(value, prefix + str(idx) + ".")
                  walk(data)
              if json_path.name == "p25_bucket_policy.json":
                  if data.get("status") != "ok":
                      raise SystemExit(f"{json_path} status is not ok")
                  if data.get("real_policy_evaluation") is not True or data.get("not_quality_evidence") is not False:
                      raise SystemExit(f"{json_path} is not a real aggregate policy evaluation")
                  if data.get("external_calls") != 0:
                      raise SystemExit(f"{json_path} should not make additional external calls")
                  if data.get("bucket_routed_v0", {}).get("per_task_routing"):
                      raise SystemExit(f"{json_path} persisted per-task routing")
                  if data.get("raw_query_stored") is not False or data.get("gold_spans_in_artifact") is not False:
