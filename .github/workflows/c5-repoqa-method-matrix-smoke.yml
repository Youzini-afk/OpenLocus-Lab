name: c5-repoqa-method-matrix-smoke

# C5-E RepoQA method-matrix retrieval smoke (manual opt-in).
#
# This workflow runs the C5-E RepoQA bounded retrieval method-matrix
# smoke in CI. It is MANUAL OPT-IN ONLY via workflow_dispatch with
# `enable_external_benchmark_network=true`. It does NOT run on PR/push
# by default. It uses NO provider secrets/vars and NO provider model env.
# It uploads ONLY the aggregate temp report
# (no release asset, raw repo records, repo names/URLs, commit SHAs,
# entrypoint paths, topics, content, dependency, needle names/
# descriptions/paths/start/end lines, generated task/label/run JSONL,
# evidence rows, cloned repos, or stdout/stderr).
#
# Claim boundary: C5-E is eval/diagnostic only. The claim level is
# `repoqa_retrieval_method_matrix_smoke_only`. This workflow does NOT
# claim an external benchmark result, NOT a leaderboard entry, NOT a
# performance claim, NOT a promotion, NOT a default/policy change, NOT
# a runtime/retriever/pack/backend/EvidenceCore semantic change, and
# NOT a downstream agent value claim. It does NOT emit `winner`,
# `best_method`, `recommended_default`, or anything implying a policy/
# default decision. If `enable_external_benchmark_network` is false,
# the workflow is a no-op with a clear message and exits 0.

on:
  workflow_dispatch:
    inputs:
      enable_external_benchmark_network:
        description: 'Allow real GitHub network access for the RepoQA asset download + repo clones (no provider secrets)'
        required: false
        default: false
        type: boolean
      needle_limit:
        description: 'Number of RepoQA Python needles to evaluate per method (default 5; hard cap 10)'
        required: false
        default: '5'
      methods:
        description: 'Comma-separated OpenLocus retrieval methods (default bm25,regex,symbol; allowed bm25/regex/symbol only; duplicates deduplicated deterministically)'
        required: false
        default: 'bm25,regex,symbol'
      language_filter:
        description: 'Language filter category (default python; only python allowed; C5-E does NOT silently fall back to all languages)'
        required: false
        default: 'python'
        type: choice
        options:
          - python

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: c5-repoqa-method-matrix-smoke-${{ github.ref }}-${{ inputs.enable_external_benchmark_network }}-${{ inputs.methods }}-${{ inputs.language_filter }}
  cancel-in-progress: false

jobs:
  c5-repoqa-method-matrix-smoke:
    name: c5e-repoqa-method-matrix-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve C5-E inputs
        id: resolve
        run: |
          enable_network="${{ inputs.enable_external_benchmark_network }}"
          needle_limit="${{ inputs.needle_limit || '5' }}"
          methods="${{ inputs.methods || 'bm25,regex,symbol' }}"
          language_filter="${{ inputs.language_filter || 'python' }}"
          # Validate needle_limit is a positive integer.
          if ! [[ "$needle_limit" =~ ^[1-9][0-9]*$ ]]; then
            echo "needle_limit must be a positive integer: $needle_limit" >&2
            exit 1
          fi
          if [[ "$needle_limit" -gt 10 ]]; then
            echo "needle_limit exceeds hard cap 10: $needle_limit (will be capped by the evaluator)" >&2
          fi
          # Validate methods: each token must be one of bm25/regex/symbol
          # (text is NOT allowed in C5-E).
          IFS=',' read -ra method_tokens <<< "$methods"
          if [[ ${#method_tokens[@]} -eq 0 ]]; then
            echo "methods must not be empty" >&2
            exit 1
          fi
          for tok in "${method_tokens[@]}"; do
            tok_trimmed="$(echo "$tok" | xargs)"
            case "$tok_trimmed" in
              bm25|regex|symbol) ;;
              *) echo "unsupported method token: $tok_trimmed (C5-E allows bm25/regex/symbol only)" >&2; exit 1 ;;
            esac
          done
          # Validate language_filter (python only).
          case "$language_filter" in
            python) ;;
            *) echo "unsupported language_filter: $language_filter (C5-E allows python only)" >&2; exit 1 ;;
          esac
          # Normalize enable_network to a lowercase boolean string.
          if [[ "$enable_network" == "true" ]]; then
            enable_network="true"
          else
            enable_network="false"
          fi
          echo "enable_network=$enable_network" >> "$GITHUB_OUTPUT"
          echo "needle_limit=$needle_limit" >> "$GITHUB_OUTPUT"
          echo "methods=$methods" >> "$GITHUB_OUTPUT"
          echo "language_filter=$language_filter" >> "$GITHUB_OUTPUT"

      - name: Build OpenLocus CLI (release)
        run: cargo build --locked --release -p openlocus-cli

      - name: py_compile C5-E evaluator
        run: python3 -m py_compile eval/c5e_repoqa_method_matrix_smoke.py

      - name: C5-E self-test (no network)
        run: python3 eval/c5e_repoqa_method_matrix_smoke.py --self-test

      - name: C5-E method-matrix smoke (only when explicitly enabled)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        env:
          NEEDLE_LIMIT: ${{ steps.resolve.outputs.needle_limit }}
          METHODS: ${{ steps.resolve.outputs.methods }}
          LANGUAGE_FILTER: ${{ steps.resolve.outputs.language_filter }}
        run: |
          report_path="$RUNNER_TEMP/c5e_repoqa_method_matrix_smoke_report.json"
          python3 eval/c5e_repoqa_method_matrix_smoke.py \
            --needle-limit "$NEEDLE_LIMIT" \
            --methods "$METHODS" \
            --language-filter "$LANGUAGE_FILTER" \
            --openlocus target/release/openlocus \
            --out "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: C5-E no-op when network not enabled
        if: ${{ steps.resolve.outputs.enable_network != 'true' }}
        run: |
          echo "enable_external_benchmark_network is false; skipping real RepoQA method-matrix smoke."
          echo "Run with enable_external_benchmark_network=true to execute the real RepoQA method-matrix retrieval smoke."
          echo "Self-test and py_compile already passed; no aggregate report is produced in no-op mode."

      - name: Validate C5-E temp report status/claim flags (fail-closed like C5-C)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        env:
          REPORT_PATH: ${{ env.report_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          path = os.environ["REPORT_PATH"]
          if not os.path.isfile(path):
              print("ERROR: report not found", file=sys.stderr)
              sys.exit(1)
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          must_be_true = {
              "aggregate_only_public_artifact",
              "diagnostic_only",
          }
          must_be_false = {
              "external_benchmark_performance_claimed",
              "leaderboard_entry_claimed",
              "downstream_agent_value_proven",
              "promotion_ready",
              "default_should_change",
              "baseline_is_policy_candidate",
              "runtime_behavior_changed",
              "retriever_changed",
              "pack_builder_changed",
              "backend_changed",
              "default_policy_changed",
              "evidencecore_semantics_changed",
              "provider_calls_made",
              "remote_provider_calls_made",
          }
          failures = []
          for flag in must_be_true:
              if report.get(flag) is not True:
                  failures.append(f"expected {flag}=true, got {report.get(flag)!r}")
          for flag in must_be_false:
              if report.get(flag) is not False:
                  failures.append(f"expected {flag}=false, got {report.get(flag)!r}")
          if report.get("dataset_license_status") != "unknown_dataset_license":
              failures.append(f"expected dataset_license_status=unknown_dataset_license, got {report.get('dataset_license_status')!r}")
          if report.get("row_level_redistribution_allowed") is not False:
              failures.append("expected row_level_redistribution_allowed=false")
          if report.get("derived_row_level_publication_allowed") is not False:
              failures.append("expected derived_row_level_publication_allowed=false")
          if report.get("aggregate_metrics_publication") != "aggregate_only_smoke":
              failures.append("expected aggregate_metrics_publication=aggregate_only_smoke")
          # Fail-closed like C5-C: network-enabled CI cannot pass with
          # unavailable/no needles. Require status in
          # (repoqa_method_matrix_smoke_pass, partial), needles_seen > 0,
          # methods_successful > 0, forbidden_scan.status=pass.
          status = report.get("status")
          if status not in ("repoqa_method_matrix_smoke_pass", "partial"):
              failures.append(
                  f"expected status in (repoqa_method_matrix_smoke_pass, partial) when network enabled, got {status!r}"
              )
          scan = report.get("forbidden_scan", {}).get("status")
          if scan != "pass":
              failures.append(f"expected forbidden_scan.status=pass, got {scan!r}")
          if report.get("self_test_passed") is not True:
              failures.append(f"expected self_test_passed=true, got {report.get('self_test_passed')!r}")
          if report.get("needles_seen", 0) <= 0:
              failures.append(f"expected needles_seen > 0, got {report.get('needles_seen')!r}")
          if report.get("methods_successful", 0) <= 0:
              failures.append(f"expected methods_successful > 0, got {report.get('methods_successful')!r}")
          # Identity fields.
          if report.get("schema_version") != "c5e_repoqa_method_matrix_smoke.v1":
              failures.append(f"unexpected schema_version: {report.get('schema_version')!r}")
          if report.get("claim_level") != "repoqa_retrieval_method_matrix_smoke_only":
              failures.append(f"unexpected claim_level: {report.get('claim_level')!r}")
          if report.get("mode") != "repoqa_bounded_method_matrix_smoke":
              failures.append(f"unexpected mode: {report.get('mode')!r}")
          if report.get("phase") != "C5-E":
              failures.append(f"unexpected phase: {report.get('phase')!r}")
          if report.get("benchmark") != "repoqa":
              failures.append(f"unexpected benchmark: {report.get('benchmark')!r}")
          if report.get("dataset_release") != "repoqa-2024-06-23":
              failures.append(f"unexpected dataset_release: {report.get('dataset_release')!r}")
          if report.get("baseline_method") != "bm25":
              failures.append(f"unexpected baseline_method: {report.get('baseline_method')!r}")
          if report.get("methods_attempted") != len(report.get("methods_requested") or []):
              failures.append(
                  f"methods_attempted mismatch: {report.get('methods_attempted')!r} "
                  f"vs requested={report.get('methods_requested')!r}"
              )
          if report.get("methods_succeeded") != report.get("methods_successful"):
              failures.append(
                  f"methods_succeeded/methods_successful mismatch: "
                  f"{report.get('methods_succeeded')!r} vs {report.get('methods_successful')!r}"
              )
          if report.get("provider_calls") != 0:
              failures.append(f"expected provider_calls=0, got {report.get('provider_calls')!r}")
          # Recommendation / policy fields must NOT appear anywhere.
          forbidden_recommendation_fields = (
              "winner", "best_method", "recommended_default",
              "recommended_method", "preferred_method", "default_method",
              "policy_decision", "decision", "ranking", "rank",
          )

          def find_keys(obj, keys, path="$"):
              found = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if k in keys:
                          found.append(f"{path}.{k}")
                      found.extend(find_keys(v, keys, f"{path}.{k}"))
              elif isinstance(obj, list):
                  for idx, v in enumerate(obj):
                      found.extend(find_keys(v, keys, f"{path}[{idx}]"))
              return found

          leaked_recommendation_fields = find_keys(
              report, forbidden_recommendation_fields
          )
          if leaked_recommendation_fields:
              failures.append(
                  f"forbidden recommendation fields present: "
                  f"{leaked_recommendation_fields}"
              )
          # RepoQA-specific forbidden keys must NOT appear anywhere.
          repoqa_forbidden_keys = (
              "repo", "commit_sha", "entrypoint_path", "topic", "content",
              "dependency", "needles", "needle", "needle_name",
              "needle_path", "needle_description", "needle_id",
              "start_line", "end_line", "start_byte", "end_byte",
              "global_start_line", "global_end_line",
              "global_start_byte", "global_end_byte", "code_ratio",
              "path", "description", "name", "query", "query_text",
              "gold_paths", "gold_lines", "gold_context", "snippet",
              "content_sha", "stdout", "stderr", "evidence",
          )
          leaked_repoqa_fields = find_keys(report, repoqa_forbidden_keys)
          if leaked_repoqa_fields:
              failures.append(
                  f"forbidden RepoQA fields present: "
                  f"{leaked_repoqa_fields}"
              )
          # method_results must be a list of records; each method in
          # bm25/regex/symbol only (no text).
          method_results = report.get("method_results")
          if not isinstance(method_results, list):
              failures.append(
                  f"expected method_results to be a list, got {type(method_results)!r}"
              )
          else:
              for idx, rec in enumerate(method_results):
                  if not isinstance(rec, dict):
                      failures.append(f"method_results[{idx}] must be a dict")
                      continue
                  m = rec.get("method")
                  if m not in ("bm25", "regex", "symbol"):
                      failures.append(
                          f"method_results[{idx}].method not allowlisted (C5-E allows bm25/regex/symbol only): {m!r}"
                      )
          # Delta records must be record-shaped.
          delta_records = report.get("smoke_metric_deltas_vs_baseline")
          if not isinstance(delta_records, list):
              failures.append(
                  f"expected smoke_metric_deltas_vs_baseline to be a list, got {type(delta_records)!r}"
              )
          else:
              allowed_delta_metrics = {"file_recall@10", "mrr", "span_f0.5@10", "success_rate"}
              allowed_delta_keys = {"baseline_method", "method", "metric", "delta"}
              for idx, rec in enumerate(delta_records):
                  if not isinstance(rec, dict):
                      failures.append(
                          f"smoke_metric_deltas_vs_baseline[{idx}] must be a dict"
                      )
                      continue
                  if set(rec) != allowed_delta_keys:
                      failures.append(
                          f"smoke_metric_deltas_vs_baseline[{idx}] has unexpected keys: {sorted(rec)!r}"
                      )
                  if rec.get("baseline_method") != "bm25":
                      failures.append(
                          f"smoke_metric_deltas_vs_baseline[{idx}].baseline_method invalid: {rec.get('baseline_method')!r}"
                      )
                  if rec.get("method") not in ("regex", "symbol"):
                      failures.append(
                          f"smoke_metric_deltas_vs_baseline[{idx}].method invalid (C5-E allows regex/symbol only): {rec.get('method')!r}"
                      )
                  if rec.get("metric") not in allowed_delta_metrics:
                      failures.append(
                          f"smoke_metric_deltas_vs_baseline[{idx}].metric invalid: {rec.get('metric')!r}"
                      )
                  if not isinstance(rec.get("delta"), (int, float)):
                      failures.append(
                          f"smoke_metric_deltas_vs_baseline[{idx}].delta must be numeric: {rec.get('delta')!r}"
                      )
          if failures:
              print("C5-E report flag validation FAILED:", file=sys.stderr)
              for f in failures:
                  print(f"  - {f}", file=sys.stderr)
              sys.exit(1)
          print("C5-E report flag validation passed.")
          print(f"  status={status}")
          print(f"  forbidden_scan={scan}")
          print(f"  self_test_passed={report.get('self_test_passed')}")
          print(f"  needles_seen={report.get('needles_seen')}")
          print(f"  methods_requested={report.get('methods_requested')}")
          print(f"  methods_attempted={report.get('methods_attempted')}")
          print(f"  methods_successful={report.get('methods_successful')}")
          print(f"  methods_succeeded={report.get('methods_succeeded')}")
          print(f"  methods_failed={report.get('methods_failed')}")
          print(f"  network_calls={report.get('network_calls')}")
          print(f"  provider_calls={report.get('provider_calls')}")
          print(f"  baseline_method={report.get('baseline_method')}")
          if report.get("failure_reason_category"):
              print(f"  failure_reason_category={report.get('failure_reason_category')}")
          PY

      - name: Validate docs i18n mirror
        run: python3 scripts/validate_docs_i18n.py

      - name: Check working tree (no generated files committed)
        run: git diff --check

      - name: Upload C5-E aggregate report artifact (aggregate only)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: c5-repoqa-method-matrix-smoke-report-${{ github.run_id }}
          path: ${{ env.report_path }}
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: false
