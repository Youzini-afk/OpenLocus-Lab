name: bea-v1-p4i-disjoint-denominator-reservoir-audit

# BEA-v1-P4I Disjoint Denominator Reservoir Audit (manual opt-in).
# MANUAL ONLY via workflow_dispatch. Does NOT run on PR/push. Uses no
# model/provider secrets. Regenerates the FD1 private decomposition under
# /tmp, validates the replay report, runs the P4I aggregate-only disjoint
# file-miss reservoir scan, and uploads only the public aggregate report.
#
# P4I is a bounded denominator/source audit after the BEA-v1-P4H No-Go
# (checkpoint 9305701, CI 28132121958, 73/80 disjoint file-miss records).
# It does NOT run P2/P3/P4 scheduler arms, does NOT validate a scheduler,
# does NOT expand retrieval, does NOT execute a selector/reranker, and does
# NOT authorize P5 / BEA-v1-A. The only diagnostic arm is
# current_bea_candidate_pool_replay (baseline file-miss detection).

on:
  workflow_dispatch:
    inputs:
      enable_external_benchmark_network:
        description: 'Allow real external benchmark + repository network access for FD1 replay + P4I reservoir scan (no model/provider secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: bea-v1-p4i-disjoint-denominator-reservoir-audit-${{ github.ref }}-${{ inputs.enable_external_benchmark_network }}
  cancel-in-progress: false

jobs:
  bea-v1-p4i-disjoint-denominator-reservoir-audit:
    name: bea-v1-p4i-disjoint-denominator-reservoir-audit
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve inputs
        id: resolve
        run: |
          enable_network="${{ inputs.enable_external_benchmark_network }}"
          [[ "$enable_network" == "true" ]] && enable_network="true" || enable_network="false"
          echo "enable_network=$enable_network" >> "$GITHUB_OUTPUT"

      - name: Build OpenLocus CLI (release)
        run: cargo build --locked --release -p openlocus-cli

      - name: py_compile BEA-v1-P4I evaluator
        run: python3 -m py_compile eval/bea_v1_p4i_disjoint_denominator_reservoir_audit.py

      - name: py_compile BEA-v1-P4H evaluator
        run: python3 -m py_compile eval/bea_v1_p4h_disjoint_scheduler_validation.py

      - name: py_compile BEA-FD1 evaluator
        run: python3 -m py_compile eval/bea_fd1_failure_decomposition.py

      - name: BEA-v1-P4I self-test (no network)
        run: python3 eval/bea_v1_p4i_disjoint_denominator_reservoir_audit.py --self-test

      - name: BEA-v1-P4H self-test (no network)
        run: python3 eval/bea_v1_p4h_disjoint_scheduler_validation.py --self-test

      - name: BEA-FD1 self-test (no network)
        run: python3 eval/bea_fd1_failure_decomposition.py --self-test

      - name: Regenerate FD1 private decomposition (only when explicitly enabled)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        run: |
          fd1_private_dir="/tmp/bea_v1_p4i_fd1_private_${GITHUB_RUN_ID:-manual}"
          fd1_replay_report="/tmp/bea_v1_p4i_fd1_replay_report_${GITHUB_RUN_ID:-manual}.json"
          rm -rf "$fd1_private_dir"
          mkdir -p "$fd1_private_dir"
          python3 eval/bea_fd1_failure_decomposition.py \
            --enable-external-benchmark-network \
            --private-decomposition-dir "$fd1_private_dir" \
            --openlocus target/release/openlocus \
            --out "$fd1_replay_report"
          jsonl_path="$fd1_private_dir/bea_fd1.decomposition.jsonl"
          if [[ ! -f "$jsonl_path" ]]; then
            echo "ERROR: FD1 private decomposition JSONL not found" >&2
            exit 1
          fi
          row_count=$(wc -l < "$jsonl_path")
          if [[ "$row_count" -ne 86040 ]]; then
            echo "ERROR: expected 86040 FD1 private decomposition rows, got $row_count" >&2
            exit 1
          fi
          if [[ ! -f "$fd1_replay_report" ]]; then
            echo "ERROR: FD1 replay report not found" >&2
            exit 1
          fi
          python3 - "$fd1_replay_report" <<'PY'
          import json, sys
          path = sys.argv[1]
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          failures = []
          if report.get("schema_version") != "bea_fd1_failure_decomposition.v1":
              failures.append(f"schema_version={report.get('schema_version')!r}")
          if report.get("status") != "bea_fd1_decomposition_pass":
              failures.append(f"status={report.get('status')!r}")
          if report.get("records_decomposed") != 239:
              failures.append(f"records_decomposed={report.get('records_decomposed')!r}")
          manifest = report.get("private_decomposition_manifest", {})
          if manifest.get("schema_version") != "bea_fd1_private_decomposition.v1":
              failures.append(f"manifest.schema_version={manifest.get('schema_version')!r}")
          if manifest.get("record_count") != 86040:
              failures.append(f"manifest.record_count={manifest.get('record_count')!r}")
          if manifest.get("records_written") is not True:
              failures.append("manifest.records_written is not true")
          if manifest.get("path_publicly_serialized") is not False:
              failures.append("manifest.path_publicly_serialized is not false")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("forbidden_scan.status is not pass")
          with open("artifacts/bea_fd1_failure_decomposition/bea_fd1_failure_decomposition_report.json", encoding="utf-8") as f:
              committed = json.load(f)
          committed_hash = committed.get("private_decomposition_manifest", {}).get("manifest_hash", "")
          replay_hash = manifest.get("manifest_hash", "")
          if not committed_hash or replay_hash != committed_hash:
              failures.append("manifest_hash mismatch")
          if failures:
              for failure in failures:
                  print(f"ERROR: {failure}", file=sys.stderr)
              sys.exit(1)
          print("FD1 replay report validation passed.")
          PY
          echo "fd1_private_jsonl=$jsonl_path" >> "$GITHUB_ENV"
          echo "fd1_replay_report=$fd1_replay_report" >> "$GITHUB_ENV"

      - name: BEA-v1-P4I disjoint denominator reservoir audit (only when FD1 replay succeeded)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        run: |
          report_path="$RUNNER_TEMP/bea_v1_p4i_disjoint_denominator_reservoir_audit_report.json"
          python3 eval/bea_v1_p4i_disjoint_denominator_reservoir_audit.py \
            --enable-external-benchmark-network \
            --openlocus target/release/openlocus \
            --fd1-artifact artifacts/bea_fd1_failure_decomposition/bea_fd1_failure_decomposition_report.json \
            --fd1-private-decomposition-jsonl "$fd1_private_jsonl" \
            --fd1-replay-artifact "$fd1_replay_report" \
            --p4h-artifact artifacts/bea_v1_p4h_disjoint_scheduler_validation/bea_v1_p4h_disjoint_scheduler_validation_report.json \
            --out "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: Upload BEA-v1-P4I preaudit aggregate report (aggregate only)
        if: ${{ always() && steps.resolve.outputs.enable_network == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: bea-v1-p4i-disjoint-denominator-reservoir-audit-preaudit-${{ github.run_id }}
          path: ${{ runner.temp }}/bea_v1_p4i_disjoint_denominator_reservoir_audit_report.json
          retention-days: 7
          if-no-files-found: ignore
          include-hidden-files: false

      - name: BEA-v1-P4I no-op when network not enabled
        if: ${{ steps.resolve.outputs.enable_network != 'true' }}
        run: |
          report_path="$RUNNER_TEMP/bea_v1_p4i_disjoint_denominator_reservoir_audit_report.json"
          python3 eval/bea_v1_p4i_disjoint_denominator_reservoir_audit.py --out "$report_path"
          status=$(python3 -c "import json; print(json.load(open('$report_path'))['status'])")
          if [[ "$status" != "unavailable_with_reason" ]]; then
            echo "WARNING: expected unavailable_with_reason for no-network default, got $status" >&2
          fi
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: Validate BEA-v1-P4I report (fail-closed)
        env:
          ENABLE_NETWORK: ${{ steps.resolve.outputs.enable_network }}
        run: |
          python3 - "$RUNNER_TEMP/bea_v1_p4i_disjoint_denominator_reservoir_audit_report.json" "$ENABLE_NETWORK" <<'PY'
          import json, os, sys
          path = sys.argv[1]
          enable_network = sys.argv[2] == "true"
          if not os.path.isfile(path):
              print("ERROR: report not found", file=sys.stderr); sys.exit(1)
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          failures = []
          status = report.get("status")
          allowed_no_network = {"unavailable_with_reason"}
          allowed_network = {
              "reservoir_ready_for_frozen_p4h_rerun",
              "no_go_disjoint_denominator_reservoir_insufficient",
              "no_go_disjoint_denominator_reservoir_unqualified",
          }
          if enable_network:
              if status not in allowed_network:
                  failures.append(f"network-enabled run must be a valid research outcome, got status: {status!r}")
              # fail_* must never be CI-valid for network-enabled real runs
              if status.startswith("fail_"):
                  failures.append(f"fail_* status {status!r} is not CI-valid for a network-enabled real run")
              if status == "unavailable_with_reason":
                  failures.append("network-enabled run cannot be unavailable_with_reason")
          else:
              if status != "unavailable_with_reason":
                  failures.append(f"expected unavailable_with_reason without network, got {status!r}")
          if report.get("schema_version") != "bea_v1_p4i_disjoint_denominator_reservoir_audit.v1":
              failures.append("unexpected schema_version")
          if report.get("claim_level") != "bea_v1_p4i_disjoint_denominator_reservoir_audit_only":
              failures.append("unexpected claim_level")
          if report.get("phase") != "BEA-v1-P4I":
              failures.append("unexpected phase")
          if report.get("diagnostic_arm") != "current_bea_candidate_pool_replay":
              failures.append("unexpected diagnostic_arm")
          if report.get("policy_arms") != ["current_bea_candidate_pool_replay"]:
              failures.append(f"unexpected policy_arms: {report.get('policy_arms')!r}")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("expected forbidden_scan.status=pass")
          if report.get("self_test_passed") is not True:
              failures.append("expected self_test_passed=true")
          for flag in ("aggregate_only_public_artifact", "records_only_public_artifact",
                       "diagnostic_only", "denominator_source_audit_only",
                       "bea_v1_p4i_audit_evaluator_no_provider_calls",
                       "bea_v1_p4i_audit_evaluator_no_selector_executed",
                       "bea_v1_p4i_audit_evaluator_latency_not_in_relevance",
                       "bea_v1_p4i_audit_evaluator_no_p2_p3_p4_scheduler_arms",
                       "bea_v1_p4i_audit_evaluator_no_retrieval_expansion"):
              if report.get(flag) is not True:
                  failures.append(f"expected {flag}=true")
          for flag in ("provider_calls_made", "remote_provider_calls_made",
                       "gold_labels_used_for_query_construction",
                       "gold_labels_used_for_selection", "gold_labels_used_for_policy",
                       "latency_in_candidate_relevance", "query_anchors_used_in_p4_arm",
                       "selector_or_reranker_changed", "selector_or_reranker_executed",
                       "default_should_change", "runtime_behavior_changed",
                       "promotion_ready", "method_winner_claimed",
                       "p2_depth_only_reference_executed",
                       "p3_constrained_depth_policy_reference_executed",
                       "p4_latency_aware_action_scheduler_executed",
                       "p5_executed", "p5_authorized", "v1_a_authorized",
                       "runtime_promotion_authorized", "method_winner_authorized",
                       "broad_retrieval_expansion_authorized",
                       "fd2b_executed", "fd2c_executed", "b16k_executed"):
              if report.get(flag) is not False:
                  failures.append(f"expected {flag}=false, got {report.get(flag)!r}")
          if report.get("denominator_source_protocol") != "raw_external_full_frame_disjoint_file_miss_reservoir_quota_scan.v1":
              failures.append("unexpected denominator_source_protocol")
          if report.get("prior_fd1_denominator_reused") is not False:
              failures.append("expected prior_fd1_denominator_reused=false")
          if report.get("prior_raw_windows_excluded") is not True:
              failures.append("expected prior_raw_windows_excluded=true")
          if report.get("exact_prior_exclusion_scope") != "fd1_private_exact_bea4_bea5_raw_keys_only":
              failures.append("unexpected exact_prior_exclusion_scope")
          if enable_network and report.get("exact_prior_exclusion_used") is not True:
              failures.append("network-enabled run requires exact BEA-4/5 prior exclusion from FD1")
          if report.get("p4h_exact_keys_available_for_exclusion") is not False:
              failures.append("expected p4h_exact_keys_available_for_exclusion=false for current aggregate-only P4H artifact")
          if report.get("denominator_constructed_before_scheduler_outcomes") is not True:
              failures.append("expected denominator_constructed_before_scheduler_outcomes=true")
          required_tables = ("source_run_records", "denominator_reservoir_records",
              "denominator_scan_records", "prior_raw_exclusion_records",
              "subgroup_reservoir_records", "stop_go_records", "gate_records",
              "private_manifest_records", "failure_category_count_records")
          for key in required_tables:
              if not isinstance(report.get(key), list):
                  failures.append(f"expected {key} to be a list")
          # records-only: no dynamic dicts except framing and forbidden_scan
          for k, v in report.items():
              if k in ("framing", "forbidden_scan"):
                  continue
              if isinstance(v, dict):
                  failures.append(f"unexpected dynamic dict field: {k}")
          if isinstance(report.get("forbidden_scan", {}).get("violation_categories"), dict):
              failures.append("forbidden_scan.violation_categories must be a list")
          forbidden = ("private_trace_dir", "per_record_reach", "per_record_scheduler",
                       "per_record_channel_actions", "candidate_paths", "candidate_keys",
                       "candidate_list", "candidates", "query_text", "queries",
                       "query_variants", "gold_paths", "gold_files", "snippets",
                       "selected_order", "private_record_id", "record_ids", "repo_url",
                       "base_commit", "exact_raw_keys", "prior_exact_raw_keys",
                       "p4h_private_denominator_scan_path", "winner", "calibration",
                       "method_winner", "hard_gates", "failure_category_counts",
                       "self_test_checks", "role_proxy_used")
          for key in forbidden:
              if key in report:
                  failures.append(f"forbidden field present: {key}")
          if enable_network:
              if report.get("raw_denominator_scan_attempted") is not True:
                  failures.append("expected raw_denominator_scan_attempted=true")
              if report.get("fd1_private_decomposition_parsed") is not True:
                  failures.append("expected fd1_private_decomposition_parsed=true")
              srr = (report.get("source_run_records") or [{}])[0] if report.get("source_run_records") else {}
              if srr.get("replay_artifact_validated") is not True:
                  failures.append("expected replay_artifact_validated=true")
              manifests = {m.get("manifest_name"): m for m in (report.get("private_manifest_records") or []) if isinstance(m, dict)}
              scan_manifest = manifests.get("bea_v1_p4i_private_reservoir_scan_manifest")
              if not scan_manifest:
                  failures.append("expected bea_v1_p4i_private_reservoir_scan_manifest")
              else:
                  # The private JSONL is written only for rows where the baseline
                  # diagnostic ran successfully (file-miss selected + baseline
                  # reached), so the manifest record_count must equal that sum.
                  scan_expected_rows = (
                      int(report.get("raw_scan_yield_file_miss_records", 0) or 0)
                      + int(report.get("raw_scan_baseline_reached_records", 0) or 0)
                  )
                  if scan_manifest.get("record_count") != scan_expected_rows:
                      failures.append(f"reservoir scan manifest record_count mismatch: {scan_manifest.get('record_count')!r} != {scan_expected_rows!r}")
                  if scan_manifest.get("path_publicly_serialized") is not False:
                      failures.append("expected scan manifest path_publicly_serialized=false")
                  # only the provenance manifest_hash is allowed; no row/key/path hashes
                  for mk in scan_manifest:
                      if mk.endswith("_hash") and mk != "manifest_hash":
                          failures.append(f"forbidden manifest hash field: {mk}")
              if not isinstance(report.get("prior_raw_exclusion_records"), list) or not report.get("prior_raw_exclusion_records"):
                  failures.append("expected prior_raw_exclusion_records")
              if status == "no_go_disjoint_denominator_reservoir_insufficient":
                  if report.get("denominator_count", 0) >= 80:
                      failures.append("insufficient reservoir status requires denominator_count < 80")
                  if report.get("cumulative_denominator_reservoir_count", 0) >= 80:
                      failures.append("insufficient reservoir status requires cumulative reservoir < 80")
                  if report.get("qualified_denominator_reservoir_count", 0) != 0:
                      failures.append("insufficient reservoir status requires qualified denominator reservoir to remain 0")
                  if report.get("raw_denominator_scan_attempted") is not True:
                      failures.append("insufficient reservoir status requires raw scan attempted")
                  for row in report.get("failure_category_count_records") or []:
                      if isinstance(row, dict) and row.get("failure_category") == "raw_denominator_clone_failed" and int(row.get("count", 0) or 0) > 0:
                          failures.append("insufficient reservoir status cannot include raw_denominator_clone_failed")
                  for row in report.get("failure_category_count_records") or []:
                      if isinstance(row, dict) and row.get("failure_category") == "raw_denominator_scan_failed" and int(row.get("count", 0) or 0) > 0:
                          failures.append("insufficient reservoir status cannot include raw_denominator_scan_failed")
              if status == "reservoir_ready_for_frozen_p4h_rerun":
                  if report.get("denominator_count", 0) < 80:
                      failures.append("reservoir_ready status requires denominator_count >= 80")
                  if report.get("cumulative_denominator_reservoir_count", 0) < 80:
                      failures.append("reservoir_ready status requires cumulative reservoir >= 80")
                  if report.get("p4h_overlap_resolved") is not True:
                      failures.append("reservoir_ready status requires p4h_overlap_resolved=true")
                  if report.get("qualified_denominator_reservoir_count", 0) < 80:
                      failures.append("reservoir_ready status requires qualified denominator reservoir >=80")
              if status == "no_go_disjoint_denominator_reservoir_unqualified":
                  if report.get("reservoir_upper_bound_count", 0) < 80:
                      failures.append("unqualified reservoir status requires upper-bound reservoir >=80")
                  if report.get("p4h_overlap_resolved") is not False:
                      failures.append("unqualified reservoir status requires p4h_overlap_resolved=false")
                  if report.get("qualified_denominator_reservoir_count", 0) != 0:
                      failures.append("unqualified reservoir status requires qualified denominator reservoir=0")
                  sgr = (report.get("stop_go_records") or [{}])[0] if report.get("stop_go_records") else {}
                  if sgr.get("frozen_p4h_rerun_authorized") is not False:
                      failures.append("unqualified reservoir status must not authorize frozen P4H rerun")
          if failures:
              print("BEA-v1-P4I report validation FAILED:", file=sys.stderr)
              for failure in failures:
                  print(f"  - {failure}", file=sys.stderr)
              sys.exit(1)
          print("BEA-v1-P4I report validation passed.")
          print(f"  status={status}")
          print(f"  denominator_count={report.get('denominator_count')}")
          print(f"  cumulative_denominator_reservoir_count={report.get('cumulative_denominator_reservoir_count')}")
          sgr = (report.get("stop_go_records") or [{}])[0] if report.get("stop_go_records") else {}
          print(f"  stop_go_decision={sgr.get('stop_go_decision')}")
          print(f"  self_test_checks_total={report.get('self_test_checks_total')}")
          PY

      - name: Validate docs i18n mirror
        run: python3 scripts/validate_docs_i18n.py

      - name: Check working tree whitespace
        run: git diff --check

      - name: Upload BEA-v1-P4I aggregate report (aggregate only)
        uses: actions/upload-artifact@v4
        with:
          name: bea-v1-p4i-disjoint-denominator-reservoir-audit-report-${{ github.run_id }}
          path: ${{ runner.temp }}/bea_v1_p4i_disjoint_denominator_reservoir_audit_report.json
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: false
