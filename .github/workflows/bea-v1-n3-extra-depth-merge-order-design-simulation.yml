name: bea-v1-n3-extra-depth-merge-order-design-simulation

# BEA-v1-N3 Extra-Depth Merge-Order Design Simulation (manual opt-in).
# MANUAL ONLY via workflow_dispatch. Does NOT run on PR/push. Uses no
# model/provider secrets. Network-enabled mode regenerates FD1 private
# decomposition under /tmp, reconstructs private N2 rows, runs deterministic
# merge-order-only simulations, validates the public artifact, and uploads only
# the validated aggregate public report.

on:
  workflow_dispatch:
    inputs:
      enable_external_benchmark_network:
        description: 'Allow benchmark/repository network access for FD1 replay + N3 private row reconstruction (no model/provider secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: bea-v1-n3-extra-depth-merge-order-${{ github.ref }}-${{ inputs.enable_external_benchmark_network }}
  cancel-in-progress: false

jobs:
  bea-v1-n3-extra-depth-merge-order-design-simulation:
    name: bea-v1-n3-extra-depth-merge-order-design-simulation
    runs-on: ubuntu-latest
    timeout-minutes: 600
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve inputs
        id: resolve
        run: |
          enable_network="${{ inputs.enable_external_benchmark_network }}"
          [[ "$enable_network" == "true" ]] && enable_network="true" || enable_network="false"
          echo "enable_network=$enable_network" >> "$GITHUB_OUTPUT"

      - name: Build and stage OpenLocus CLI
        run: |
          cargo build --locked --release -p openlocus-cli
          mkdir -p /tmp/openlocus_n3_bin
          cp target/release/openlocus /tmp/openlocus_n3_bin/openlocus
          rm -rf target
          /tmp/openlocus_n3_bin/openlocus --help >/dev/null
          echo "OPENLOCUS_BIN=/tmp/openlocus_n3_bin/openlocus" >> "$GITHUB_ENV"

      - name: py_compile prerequisite evaluators
        run: |
          python3 -m py_compile eval/bea_fd1_failure_decomposition.py
          python3 -m py_compile eval/bea_v1_p4h_disjoint_scheduler_validation.py
          python3 -m py_compile eval/bea_v1_p4i_disjoint_denominator_reservoir_audit.py
          python3 -m py_compile eval/bea_v1_p4j_cross_source_reservoir_unlock_audit.py
          python3 -m py_compile eval/bea_v1_p4k_exact_overlap_resolution_locked_reservoir_audit.py
          python3 -m py_compile eval/bea_v1_p4l_locked_non_python_scheduler_validation.py
          python3 -m py_compile eval/bea_v1_n1_frozen_p4_span_refiner_smoke.py
          python3 -m py_compile eval/bea_v1_n2_rank_pack_actionability_decomposition.py
          python3 -m py_compile eval/bea_v1_n3_extra_depth_merge_order_design_simulation.py

      - name: Self-tests (no network)
        run: |
          python3 eval/bea_fd1_failure_decomposition.py --self-test
          python3 eval/bea_v1_p4h_disjoint_scheduler_validation.py --self-test
          python3 eval/bea_v1_p4i_disjoint_denominator_reservoir_audit.py --self-test
          python3 eval/bea_v1_p4j_cross_source_reservoir_unlock_audit.py --self-test
          python3 eval/bea_v1_p4k_exact_overlap_resolution_locked_reservoir_audit.py --self-test
          python3 eval/bea_v1_p4l_locked_non_python_scheduler_validation.py --self-test
          python3 eval/bea_v1_n1_frozen_p4_span_refiner_smoke.py --self-test
          python3 eval/bea_v1_n2_rank_pack_actionability_decomposition.py --self-test
          python3 eval/bea_v1_n3_extra_depth_merge_order_design_simulation.py --self-test

      - name: Regenerate FD1 private decomposition (only when explicitly enabled)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        run: |
          fd1_private_dir="/tmp/bea_v1_n3_fd1_private_${GITHUB_RUN_ID:-manual}"
          fd1_replay_report="/tmp/bea_v1_n3_fd1_replay_report_${GITHUB_RUN_ID:-manual}.json"
          rm -rf "$fd1_private_dir"
          mkdir -p "$fd1_private_dir"
          python3 eval/bea_fd1_failure_decomposition.py \
            --enable-external-benchmark-network \
            --private-decomposition-dir "$fd1_private_dir" \
            --openlocus "$OPENLOCUS_BIN" \
            --out "$fd1_replay_report"
          jsonl_path="$fd1_private_dir/bea_fd1.decomposition.jsonl"
          if [[ ! -f "$jsonl_path" ]]; then
            echo "ERROR: FD1 private decomposition JSONL not found" >&2
            exit 1
          fi
          row_count=$(wc -l < "$jsonl_path")
          if [[ "$row_count" -ne 86040 ]]; then
            echo "ERROR: expected 86040 FD1 private decomposition rows, got $row_count" >&2
            exit 1
          fi
          python3 - "$fd1_replay_report" <<'PY'
          import json, sys
          path = sys.argv[1]
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          failures = []
          if report.get("schema_version") != "bea_fd1_failure_decomposition.v1":
              failures.append("schema_version")
          if report.get("status") != "bea_fd1_decomposition_pass":
              failures.append("status")
          if report.get("records_decomposed") != 239:
              failures.append("records_decomposed")
          manifest = report.get("private_decomposition_manifest", {})
          if manifest.get("record_count") != 86040:
              failures.append("manifest.record_count")
          with open("artifacts/bea_fd1_failure_decomposition/bea_fd1_failure_decomposition_report.json", encoding="utf-8") as f:
              committed = json.load(f)
          if manifest.get("manifest_hash") != committed.get("private_decomposition_manifest", {}).get("manifest_hash"):
              failures.append("manifest_hash")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("forbidden_scan")
          if failures:
              for failure in failures:
                  print(f"ERROR: {failure}", file=sys.stderr)
              sys.exit(1)
          print("FD1 replay report validation passed.")
          PY
          echo "fd1_private_jsonl=$jsonl_path" >> "$GITHUB_ENV"
          echo "fd1_replay_report=$fd1_replay_report" >> "$GITHUB_ENV"

      - name: BEA-v1-N3 merge-order design simulation (only when FD1 replay succeeded)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        run: |
          export REPORT_PATH="$RUNNER_TEMP/bea_v1_n3_extra_depth_merge_order_design_simulation_report.json"
          export OPENLOCUS_BEA_V1_N3_PRIVATE_DIR="/tmp/bea_v1_n3_private_${GITHUB_RUN_ID:-manual}"
          python3 - <<'PY'
          import os
          import subprocess
          import sys
          import time

          cmd = [
              "python3", "eval/bea_v1_n3_extra_depth_merge_order_design_simulation.py",
              "--enable-external-benchmark-network",
              "--openlocus", os.environ["OPENLOCUS_BIN"],
              "--n2-artifact", "artifacts/bea_v1_n2_rank_pack_actionability_decomposition/bea_v1_n2_rank_pack_actionability_decomposition_report.json",
              "--fd1-artifact", "artifacts/bea_fd1_failure_decomposition/bea_fd1_failure_decomposition_report.json",
              "--fd1-private-decomposition-jsonl", os.environ["fd1_private_jsonl"],
              "--fd1-replay-artifact", os.environ["fd1_replay_report"],
              "--p4h-artifact", "artifacts/bea_v1_p4h_disjoint_scheduler_validation/bea_v1_p4h_disjoint_scheduler_validation_report.json",
              "--p4i-artifact", "artifacts/bea_v1_p4i_disjoint_denominator_reservoir_audit/bea_v1_p4i_disjoint_denominator_reservoir_audit_report.json",
              "--p4j-artifact", "artifacts/bea_v1_p4j_cross_source_reservoir_unlock_audit/bea_v1_p4j_cross_source_reservoir_unlock_audit_report.json",
              "--p4k-artifact", "artifacts/bea_v1_p4k_exact_overlap_resolution_locked_reservoir_audit/bea_v1_p4k_exact_overlap_resolution_locked_reservoir_audit_report.json",
              "--out", os.environ["REPORT_PATH"],
          ]
          proc = subprocess.Popen(cmd)
          while True:
              rc = proc.poll()
              if rc is not None:
                  sys.exit(rc)
              print(f"N3 evaluator heartbeat: still running at {time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())}", flush=True)
              time.sleep(60)
          PY
          echo "report_path=$REPORT_PATH" >> "$GITHUB_ENV"

      - name: BEA-v1-N3 default unavailable artifact (network disabled)
        if: ${{ steps.resolve.outputs.enable_network != 'true' }}
        run: |
          report_path="$RUNNER_TEMP/bea_v1_n3_extra_depth_merge_order_design_simulation_report.json"
          python3 eval/bea_v1_n3_extra_depth_merge_order_design_simulation.py --out "$report_path"
          status=$(python3 -c "import json; print(json.load(open('$report_path'))['status'])")
          if [[ "$status" != "unavailable_with_reason" ]]; then
            echo "ERROR: expected unavailable_with_reason without network, got $status" >&2
            exit 1
          fi
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: Validate BEA-v1-N3 public report contract
        env:
          ENABLE_NETWORK: ${{ steps.resolve.outputs.enable_network }}
        run: |
          python3 - "$RUNNER_TEMP/bea_v1_n3_extra_depth_merge_order_design_simulation_report.json" "$ENABLE_NETWORK" <<'PY'
          import json, os, sys
          path = sys.argv[1]
          enable_network = sys.argv[2] == "true"
          if not os.path.isfile(path):
              print("ERROR: report missing", file=sys.stderr); sys.exit(1)
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          failures = []
          status = report.get("status")
          allowed_network = {
              "no_go_n3_n2_artifact_or_trace_unavailable",
              "no_go_n3_insufficient_design_denominator",
              "no_go_n3_incomplete_closed_n2_reconstruction",
              "n3_merge_order_design_exploratory",
              "n3_merge_order_design_inconclusive",
              "n3_merge_order_tradeoff_no_go",
              "n3_merge_order_design_simulation_pass",
          }
          if enable_network:
              if status not in allowed_network:
                  failures.append(f"network-enabled run must be a valid N3 outcome, got {status!r}")
              if str(status).startswith("fail_") or status == "unavailable_with_reason":
                  failures.append(f"network-enabled run cannot use infra/default status {status!r}")
          else:
              if status != "unavailable_with_reason":
                  failures.append(f"expected unavailable_with_reason without network, got {status!r}")
          if report.get("schema_version") != "bea_v1_n3_extra_depth_merge_order_design_simulation.v1":
              failures.append("unexpected schema_version")
          if report.get("claim_level") != "bea_v1_n3_extra_depth_merge_order_design_simulation_only":
              failures.append("unexpected claim_level")
          if report.get("phase") != "BEA-v1-N3":
              failures.append("unexpected phase")
          if report.get("source_result_checkpoint") != "ce47caf" or report.get("n2_result_checkpoint") != "ce47caf":
              failures.append("unexpected N2 source/result checkpoint provenance")
          if report.get("source_checkpoint") != "7c90213":
              failures.append("unexpected N2 source checkpoint provenance")
          if report.get("source_ci_run_id") != "28272769423" or report.get("n2_empirical_ci_run_id") != "28272769423":
              failures.append("unexpected N2 empirical CI provenance")
          if report.get("n3_result_checkpoint") not in {"", None} or report.get("n3_empirical_ci_run_id") not in {"", None}:
              failures.append("N3 result/CI fields must be empty before result writeback")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("forbidden_scan.status must be pass")
          for flag in ("retrieval_expansion_used", "new_retrieval_used", "new_files_added", "candidate_scoring_model_used", "learned_weights_used", "gold_labels_used_in_policy", "snippet_content_relevance_scoring_used", "provider_calls_made", "selector_or_reranker_executed", "p5_executed", "p5_authorized", "v1_a_selector_executed", "v1_a_authorized", "runtime_behavior_changed", "runtime_promotion_authorized", "implementation_authorized"):
              if report.get(flag) is not False:
                  failures.append(f"expected {flag}=false")
          if report.get("extra_depth_merge_order_implementation_smoke_design_authorized") is not (status == "n3_merge_order_design_simulation_pass"):
              failures.append("design-only authorization flag must be true only on N3 pass")
          row_allow = {
              "anonymous_local_id", "denominator", "source_bucket", "language_bucket",
              "baseline_first_gold_rank_bucket", "sim_arm", "top10_recovery_bucket",
              "evidencecore_materializable", "original_top10_retention_bucket",
              "duplicate_pressure_delta_bucket", "hard_cap_violation",
          }
          for i, row in enumerate(report.get("sanitized_analysis_records", [])):
              if set(row) != row_allow:
                  failures.append(f"sanitized row {i} schema mismatch")
              if row.get("denominator") != "D3_extra_depth_merge_order_design":
                  failures.append(f"sanitized row {i} denominator mismatch")
              if row.get("sim_arm") not in set(report.get("sim_arm_vocabulary", [])):
                  failures.append(f"sanitized row {i} invalid sim_arm")
              if row.get("top10_recovery_bucket") not in {"recovered", "not_recovered"}:
                  failures.append(f"sanitized row {i} invalid recovery bucket")
              if row.get("original_top10_retention_bucket") not in {"retained_ge_50", "retained_lt_50"}:
                  failures.append(f"sanitized row {i} invalid retention bucket")
              if row.get("duplicate_pressure_delta_bucket") not in {"improved_or_same", "worsened"}:
                  failures.append(f"sanitized row {i} invalid duplicate bucket")
              if not isinstance(row.get("evidencecore_materializable"), bool):
                  failures.append(f"sanitized row {i} evidencecore_materializable must be bool")
              if not isinstance(row.get("hard_cap_violation"), bool):
                  failures.append(f"sanitized row {i} hard_cap_violation must be bool")
          metrics = {r.get("metric_name"): r.get("value") for r in report.get("d3_merge_order_simulation_records", []) if isinstance(r, dict)}
          d3 = report.get("d3_design_denominator_count")
          sim_arm_count = len(report.get("sim_arm_vocabulary", []))
          if status not in {"no_go_n3_n2_artifact_or_trace_unavailable"}:
              if len(report.get("sanitized_analysis_records", [])) != int(d3 or 0) * sim_arm_count:
                  failures.append("sanitized row count must equal D3 count times simulation arm count")
          if enable_network and status not in {"no_go_n3_n2_artifact_or_trace_unavailable"}:
              if report.get("closed_n2_artifact_validated") is not True:
                  failures.append("expected closed_n2_artifact_validated=true")
              if report.get("d3_design_denominator_count") != 40 and status not in {"no_go_n3_incomplete_closed_n2_reconstruction", "no_go_n3_insufficient_design_denominator", "n3_merge_order_design_exploratory"}:
                  failures.append("non-reconstruction No-Go/status requires d3=40")
          pass_count = int(metrics.get("pass_eligible_nonbaseline_arm_count") or 0)
          tradeoff_count = int(metrics.get("tradeoff_nonbaseline_arm_count") or 0)
          if status == "n3_merge_order_design_simulation_pass" and (d3 != 40 or pass_count < 1):
              failures.append("pass status requires D3=40 and at least one pass-eligible nonbaseline arm")
          if status == "n3_merge_order_design_inconclusive" and (d3 != 40 or pass_count != 0 or tradeoff_count != 0):
              failures.append("inconclusive status requires D3=40 and no pass/tradeoff arm")
          if status == "n3_merge_order_tradeoff_no_go" and (d3 != 40 or pass_count != 0 or tradeoff_count < 1):
              failures.append("tradeoff No-Go requires D3=40, no pass arm, and at least one tradeoff arm")
          if status == "n3_merge_order_design_exploratory" and not (10 <= int(d3 or 0) < 20):
              failures.append("exploratory status requires 10 <= D3 < 20")
          if status == "no_go_n3_insufficient_design_denominator" and int(d3 or 0) >= 10:
              failures.append("insufficient denominator No-Go requires D3 < 10")
          if status == "no_go_n3_incomplete_closed_n2_reconstruction" and int(d3 or 0) in {40}:
              failures.append("incomplete reconstruction No-Go requires D3 != 40")
          if failures:
              print("BEA-v1-N3 report validation FAILED:", file=sys.stderr)
              for failure in failures:
                  print(f"  - {failure}", file=sys.stderr)
              sys.exit(1)
          print("BEA-v1-N3 report validation passed.")
          print(f"  status={status}")
          print(f"  d3={report.get('d3_design_denominator_count')}")
          PY

      - name: Validate docs i18n mirror
        run: python3 scripts/validate_docs_i18n.py

      - name: Check working tree whitespace
        run: git diff --check

      - name: Upload BEA-v1-N3 public aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: bea-v1-n3-extra-depth-merge-order-design-simulation-report-${{ github.run_id }}
          path: ${{ runner.temp }}/bea_v1_n3_extra_depth_merge_order_design_simulation_report.json
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: false
