name: c5-repoqa-bm25-retrieval-smoke

# C5-D RepoQA BM25 retrieval performance smoke (manual opt-in).
#
# This workflow runs the C5-D RepoQA bounded retrieval performance
# smoke in CI. It is MANUAL OPT-IN ONLY via workflow_dispatch with
# `enable_external_benchmark_network=true`. It does NOT run on PR/push
# by default. It uses NO provider secrets/vars and NO provider model env.
# It uploads ONLY the aggregate temp report
# (no raw repo records, repo names/URLs, commit SHAs, entrypoint paths,
# topics, content, dependency, needle names/descriptions/paths/start/
# end lines, generated task/label/run JSONL, evidence rows, cloned
# repos, the release asset, or stdout/stderr).
#
# Claim boundary: C5-D is eval/diagnostic only. The claim level is
# `repoqa_retrieval_performance_smoke_only`. This workflow does NOT
# claim an external benchmark result, NOT a leaderboard entry, NOT a
# performance claim, NOT a promotion, NOT a default/policy change, NOT
# a runtime/retriever/pack/backend/EvidenceCore semantic change, and
# NOT a downstream agent value claim. It does NOT emit `winner`,
# `best_method`, `recommended_default`, or anything implying a policy/
# default decision. If `enable_external_benchmark_network` is false,
# the workflow is a no-op with a clear message and exits 0.

on:
  workflow_dispatch:
    inputs:
      enable_external_benchmark_network:
        description: 'Allow real GitHub network access for the RepoQA asset download + repo clones (no provider secrets)'
        required: false
        default: false
        type: boolean
      needle_limit:
        description: 'Number of RepoQA Python needles to evaluate (default 5; hard cap 10)'
        required: false
        default: '5'
      language_filter:
        description: 'Language filter category (default python; only python allowed; C5-D does NOT silently fall back to all languages)'
        required: false
        default: 'python'
        type: choice
        options:
          - python
      method:
        description: 'OpenLocus retrieval method (default bm25; only bm25 allowed)'
        required: false
        default: 'bm25'
        type: choice
        options:
          - bm25

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: c5-repoqa-bm25-retrieval-smoke-${{ github.ref }}-${{ inputs.enable_external_benchmark_network }}-${{ inputs.method }}-${{ inputs.language_filter }}
  cancel-in-progress: false

jobs:
  c5-repoqa-bm25-retrieval-smoke:
    name: c5d-repoqa-bm25-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve C5-D inputs
        id: resolve
        run: |
          enable_network="${{ inputs.enable_external_benchmark_network }}"
          needle_limit="${{ inputs.needle_limit || '5' }}"
          language_filter="${{ inputs.language_filter || 'python' }}"
          method="${{ inputs.method || 'bm25' }}"
          # Validate needle_limit is a positive integer.
          if ! [[ "$needle_limit" =~ ^[1-9][0-9]*$ ]]; then
            echo "needle_limit must be a positive integer: $needle_limit" >&2
            exit 1
          fi
          if [[ "$needle_limit" -gt 10 ]]; then
            echo "needle_limit exceeds hard cap 10: $needle_limit (will be capped by the evaluator)" >&2
          fi
          # Validate language_filter (python only).
          case "$language_filter" in
            python) ;;
            *) echo "unsupported language_filter: $language_filter (C5-D allows python only)" >&2; exit 1 ;;
          esac
          # Validate method (bm25 only).
          case "$method" in
            bm25) ;;
            *) echo "unsupported method: $method (C5-D allows bm25 only)" >&2; exit 1 ;;
          esac
          # Normalize enable_network to a lowercase boolean string.
          if [[ "$enable_network" == "true" ]]; then
            enable_network="true"
          else
            enable_network="false"
          fi
          echo "enable_network=$enable_network" >> "$GITHUB_OUTPUT"
          echo "needle_limit=$needle_limit" >> "$GITHUB_OUTPUT"
          echo "language_filter=$language_filter" >> "$GITHUB_OUTPUT"
          echo "method=$method" >> "$GITHUB_OUTPUT"

      - name: Build OpenLocus CLI (release)
        run: cargo build --locked --release -p openlocus-cli

      - name: py_compile C5-D evaluator
        run: python3 -m py_compile eval/c5d_repoqa_bm25_retrieval_smoke.py

      - name: C5-D self-test (no network)
        run: python3 eval/c5d_repoqa_bm25_retrieval_smoke.py --self-test

      - name: C5-D RepoQA smoke (only when explicitly enabled)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        env:
          NEEDLE_LIMIT: ${{ steps.resolve.outputs.needle_limit }}
          LANGUAGE_FILTER: ${{ steps.resolve.outputs.language_filter }}
          METHOD: ${{ steps.resolve.outputs.method }}
        run: |
          report_path="$RUNNER_TEMP/c5d_repoqa_bm25_retrieval_smoke_report.json"
          python3 eval/c5d_repoqa_bm25_retrieval_smoke.py \
            --needle-limit "$NEEDLE_LIMIT" \
            --language-filter "$LANGUAGE_FILTER" \
            --method "$METHOD" \
            --openlocus target/release/openlocus \
            --out "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: C5-D no-op when network not enabled
        if: ${{ steps.resolve.outputs.enable_network != 'true' }}
        run: |
          echo "enable_external_benchmark_network is false; skipping real RepoQA network smoke."
          echo "Run with enable_external_benchmark_network=true to execute the real RepoQA BM25 retrieval performance smoke."
          echo "Self-test and py_compile already passed; no aggregate report is produced in no-op mode."

      - name: Validate C5-D temp report status/claim flags (fail-closed like C5-C)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        env:
          REPORT_PATH: ${{ env.report_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          path = os.environ["REPORT_PATH"]
          if not os.path.isfile(path):
              print("ERROR: report not found", file=sys.stderr)
              sys.exit(1)
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          # Required claim boundary invariants for the C5-D RepoQA
          # bounded retrieval performance smoke. C5-D runs NO provider,
          # makes NO remote provider calls, proves NO downstream agent
          # value, promotes NO candidate, changes NO runtime/retriever/
          # pack/backend/default-policy/EvidenceCore semantics, claims
          # NO external benchmark performance (smoke only), emits NO
          # leaderboard entry, NO winner, NO best_method, NO
          # recommended_default.
          must_be_true = {
              "aggregate_only_public_artifact",
              "diagnostic_only",
          }
          must_be_false = {
              "external_benchmark_performance_claimed",
              "leaderboard_entry_claimed",
              "downstream_agent_value_proven",
              "promotion_ready",
              "default_should_change",
              "runtime_behavior_changed",
              "retriever_changed",
              "pack_builder_changed",
              "backend_changed",
              "default_policy_changed",
              "evidencecore_semantics_changed",
              "provider_calls_made",
              "remote_provider_calls_made",
          }
          failures = []
          for flag in must_be_true:
              if report.get(flag) is not True:
                  failures.append(f"expected {flag}=true, got {report.get(flag)!r}")
          for flag in must_be_false:
              if report.get(flag) is not False:
                  failures.append(f"expected {flag}=false, got {report.get(flag)!r}")
          # License fields.
          if report.get("dataset_license_status") != "unknown_dataset_license":
              failures.append(f"expected dataset_license_status=unknown_dataset_license, got {report.get('dataset_license_status')!r}")
          if report.get("row_level_redistribution_allowed") is not False:
              failures.append("expected row_level_redistribution_allowed=false")
          if report.get("derived_row_level_publication_allowed") is not False:
              failures.append("expected derived_row_level_publication_allowed=false")
          if report.get("aggregate_metrics_publication") != "aggregate_only_smoke":
              failures.append("expected aggregate_metrics_publication=aggregate_only_smoke")
          # Fail-closed like C5-C: network-enabled CI cannot pass with
          # unavailable/no needles. Require status in
          # (repoqa_retrieval_smoke_pass, partial), needles_seen > 0,
          # needles_successful > 0, forbidden_scan.status=pass.
          status = report.get("status")
          if status not in ("repoqa_retrieval_smoke_pass", "partial"):
              failures.append(
                  f"expected status in (repoqa_retrieval_smoke_pass, partial) when network enabled, got {status!r}"
              )
          scan = report.get("forbidden_scan", {}).get("status")
          if scan != "pass":
              failures.append(f"expected forbidden_scan.status=pass, got {scan!r}")
          if report.get("self_test_passed") is not True:
              failures.append(f"expected self_test_passed=true, got {report.get('self_test_passed')!r}")
          if report.get("needles_seen", 0) <= 0:
              failures.append(f"expected needles_seen > 0, got {report.get('needles_seen')!r}")
          if report.get("needles_successful", 0) <= 0:
              failures.append(f"expected needles_successful > 0, got {report.get('needles_successful')!r}")
          # Identity fields.
          if report.get("schema_version") != "c5d_repoqa_retrieval_performance_smoke.v1":
              failures.append(f"unexpected schema_version: {report.get('schema_version')!r}")
          if report.get("claim_level") != "repoqa_retrieval_performance_smoke_only":
              failures.append(f"unexpected claim_level: {report.get('claim_level')!r}")
          if report.get("mode") != "repoqa_bounded_bm25_retrieval_smoke":
              failures.append(f"unexpected mode: {report.get('mode')!r}")
          if report.get("phase") != "C5-D":
              failures.append(f"unexpected phase: {report.get('phase')!r}")
          if report.get("benchmark") != "repoqa":
              failures.append(f"unexpected benchmark: {report.get('benchmark')!r}")
          if report.get("dataset_release") != "repoqa-2024-06-23":
              failures.append(f"unexpected dataset_release: {report.get('dataset_release')!r}")
          if report.get("method") != "bm25":
              failures.append(f"unexpected method: {report.get('method')!r}")
          if report.get("language_filter") != "python":
              failures.append(f"unexpected language_filter: {report.get('language_filter')!r}")
          if report.get("query_mode") != "needle_description":
              failures.append(f"unexpected query_mode: {report.get('query_mode')!r}")
          if report.get("gold_target_mode") != "needle_path_line_range":
              failures.append(f"unexpected gold_target_mode: {report.get('gold_target_mode')!r}")
          # Provider calls must be 0.
          if report.get("provider_calls") != 0:
              failures.append(f"expected provider_calls=0, got {report.get('provider_calls')!r}")
          # Recommendation / policy fields must NOT appear anywhere.
          forbidden_recommendation_fields = (
              "winner", "best_method", "recommended_default",
              "recommended_method", "preferred_method", "default_method",
              "policy_decision", "decision", "ranking", "rank",
          )

          def find_keys(obj, keys, path="$"):
              found = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if k in keys:
                          found.append(f"{path}.{k}")
                      found.extend(find_keys(v, keys, f"{path}.{k}"))
              elif isinstance(obj, list):
                  for idx, v in enumerate(obj):
                      found.extend(find_keys(v, keys, f"{path}[{idx}]"))
              return found

          leaked_recommendation_fields = find_keys(
              report, forbidden_recommendation_fields
          )
          if leaked_recommendation_fields:
              failures.append(
                  f"forbidden recommendation fields present: "
                  f"{leaked_recommendation_fields}"
              )
          # RepoQA-specific forbidden keys must NOT appear anywhere.
          repoqa_forbidden_keys = (
              "repo", "commit_sha", "entrypoint_path", "topic", "content",
              "dependency", "needles", "needle", "needle_name",
              "needle_path", "needle_description", "needle_id",
              "start_line", "end_line", "start_byte", "end_byte",
              "global_start_line", "global_end_line",
              "global_start_byte", "global_end_byte", "code_ratio",
              "path", "description", "name", "query", "query_text",
              "gold_paths", "gold_lines", "gold_context", "snippet",
              "content_sha", "stdout", "stderr", "evidence",
          )
          leaked_repoqa_fields = find_keys(report, repoqa_forbidden_keys)
          if leaked_repoqa_fields:
              failures.append(
                  f"forbidden RepoQA fields present: "
                  f"{leaked_repoqa_fields}"
              )
          # aggregate_metrics must only contain allowlisted keys.
          agg_metrics = report.get("aggregate_metrics", {})
          allowed_metrics = {"file_recall@10", "mrr", "span_f0.5@10", "success_rate"}
          if not isinstance(agg_metrics, dict):
              failures.append("expected aggregate_metrics to be a dict")
          else:
              unexpected = set(agg_metrics.keys()) - allowed_metrics
              if unexpected:
                  failures.append(
                      f"aggregate_metrics has unexpected keys: {sorted(unexpected)!r}"
                  )
          if failures:
              print("C5-D report flag validation FAILED:", file=sys.stderr)
              for f in failures:
                  print(f"  - {f}", file=sys.stderr)
              sys.exit(1)
          print("C5-D report flag validation passed.")
          print(f"  status={status}")
          print(f"  forbidden_scan={scan}")
          print(f"  self_test_passed={report.get('self_test_passed')}")
          print(f"  needles_seen={report.get('needles_seen')}")
          print(f"  needles_evaluated={report.get('needles_evaluated')}")
          print(f"  needles_successful={report.get('needles_successful')}")
          print(f"  needles_failed={report.get('needles_failed')}")
          print(f"  network_calls={report.get('network_calls')}")
          print(f"  provider_calls={report.get('provider_calls')}")
          print(f"  aggregate_runtime_seconds={report.get('aggregate_runtime_seconds')}")
          if report.get("failure_reason_category"):
              print(f"  failure_reason_category={report.get('failure_reason_category')}")
          PY

      - name: Validate docs i18n mirror
        run: python3 scripts/validate_docs_i18n.py

      - name: Check working tree (no generated files committed)
        run: git diff --check

      - name: Upload C5-D aggregate report artifact (aggregate only)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: c5-repoqa-bm25-retrieval-smoke-report-${{ github.run_id }}
          path: ${{ env.report_path }}
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: false
