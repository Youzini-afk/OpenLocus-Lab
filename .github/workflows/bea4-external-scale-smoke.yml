name: bea4-external-scale-smoke

# BEA-4 External Scale Smoke (manual opt-in).
# MANUAL OPT-IN ONLY via workflow_dispatch with
# enable_external_benchmark_network=true. Does NOT run on PR/push.
# Uses NO provider secrets/vars/model env. Uploads ONLY the aggregate
# public report.
#
# Claim boundary: eval/diagnostic only. claim_level =
# bea_v03_external_scale_smoke_only. NOT benchmark/leaderboard/
# method-winner/default/calibration/downstream-value/promotion/
# runtime/EvidenceCore change. The v0.3 algorithm and weights are frozen
# exactly as in BEA-3; this phase is scale measurement, not a new
# algorithm. algorithm_changed_during_bea4=false,
# weights_tuned_during_bea4=false (binding).

on:
  workflow_dispatch:
    inputs:
      enable_external_benchmark_network:
        description: 'Allow real HuggingFace + GitHub network access (no provider secrets)'
        required: false
        default: false
        type: boolean
      contextbench_row_offset:
        description: 'ContextBench row offset (default 80)'
        required: false
        default: '80'
      contextbench_row_limit:
        description: 'ContextBench row limit (default 80; hard cap 80; fallback 50 if runtime concern)'
        required: false
        default: '80'
      repoqa_needle_offset:
        description: 'RepoQA needle offset (default 40)'
        required: false
        default: '40'
      repoqa_needle_limit:
        description: 'RepoQA needle limit (default 40; hard cap 40; fallback 25 if runtime concern)'
        required: false
        default: '40'
      budget:
        description: 'Evidence budget (default 5; hard cap 20)'
        required: false
        default: '5'
      methods:
        description: 'Comma-separated retrieval methods (default bm25,regex,symbol; bm25 required)'
        required: false
        default: 'bm25,regex,symbol'
      enable_rrf_baseline:
        description: 'Enable the required rrf_same_budget arm (default true; BEA-4 requires true)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: bea4-external-scale-smoke-${{ github.ref }}-${{ inputs.enable_external_benchmark_network }}-${{ inputs.contextbench_row_offset }}-${{ inputs.contextbench_row_limit }}-${{ inputs.repoqa_needle_offset }}-${{ inputs.repoqa_needle_limit }}-${{ inputs.budget }}
  cancel-in-progress: false

jobs:
  bea4-external-scale-smoke:
    name: bea4-external-scale-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve BEA-4 inputs
        id: resolve
        run: |
          enable_network="${{ inputs.enable_external_benchmark_network }}"
          cb_offset="${{ inputs.contextbench_row_offset || '80' }}"
          cb_limit="${{ inputs.contextbench_row_limit || '80' }}"
          rq_offset="${{ inputs.repoqa_needle_offset || '40' }}"
          rq_limit="${{ inputs.repoqa_needle_limit || '40' }}"
          budget="${{ inputs.budget || '5' }}"
          methods="${{ inputs.methods || 'bm25,regex,symbol' }}"
          enable_rrf="${{ inputs.enable_rrf_baseline || 'true' }}"
          for var in cb_offset rq_offset; do
            val="${!var}"
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then echo "$var must be non-negative integer" >&2; exit 1; fi
          done
          for var in cb_limit rq_limit budget; do
            val="${!var}"
            if ! [[ "$val" =~ ^[1-9][0-9]*$ ]]; then echo "$var must be positive integer" >&2; exit 1; fi
          done
          [[ "$cb_limit" -gt 80 ]] && echo "cb_limit exceeds cap 80" >&2
          [[ "$rq_limit" -gt 40 ]] && echo "rq_limit exceeds cap 40" >&2
          [[ "$budget" -gt 20 ]] && echo "budget exceeds cap 20" >&2
          IFS=',' read -ra ma <<< "$methods"
          has_bm25=0
          for m in "${ma[@]}"; do
            mt="$(echo -n "$m" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
            case "$mt" in bm25|regex|symbol) ;; *) echo "unsupported method: $mt" >&2; exit 1 ;; esac
            [[ "$mt" == "bm25" ]] && has_bm25=1
          done
          [[ "$has_bm25" -eq 0 ]] && echo "methods must include bm25" >&2 && exit 1
          [[ "$enable_network" == "true" ]] && enable_network="true" || enable_network="false"
          [[ "$enable_rrf" == "true" ]] && enable_rrf="true" || { echo "BEA-4 requires enable_rrf_baseline=true" >&2; exit 1; }
          echo "enable_network=$enable_network" >> "$GITHUB_OUTPUT"
          echo "cb_offset=$cb_offset" >> "$GITHUB_OUTPUT"
          echo "cb_limit=$cb_limit" >> "$GITHUB_OUTPUT"
          echo "rq_offset=$rq_offset" >> "$GITHUB_OUTPUT"
          echo "rq_limit=$rq_limit" >> "$GITHUB_OUTPUT"
          echo "budget=$budget" >> "$GITHUB_OUTPUT"
          echo "methods=$methods" >> "$GITHUB_OUTPUT"
          echo "enable_rrf=$enable_rrf" >> "$GITHUB_OUTPUT"

      - name: Build OpenLocus CLI (release)
        run: cargo build --locked --release -p openlocus-cli

      - name: py_compile BEA-4 evaluator
        run: python3 -m py_compile eval/bea4_external_scale_smoke.py

      - name: BEA-4 self-test (no network)
        run: python3 eval/bea4_external_scale_smoke.py --self-test

      - name: BEA-4 scale smoke (only when explicitly enabled)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        env:
          CB_OFFSET: ${{ steps.resolve.outputs.cb_offset }}
          CB_LIMIT: ${{ steps.resolve.outputs.cb_limit }}
          RQ_OFFSET: ${{ steps.resolve.outputs.rq_offset }}
          RQ_LIMIT: ${{ steps.resolve.outputs.rq_limit }}
          BUDGET: ${{ steps.resolve.outputs.budget }}
          METHODS: ${{ steps.resolve.outputs.methods }}
          ENABLE_RRF: ${{ steps.resolve.outputs.enable_rrf }}
        run: |
          report_path="$RUNNER_TEMP/bea4_external_scale_smoke_report.json"
          rrf_flag=""
          [[ "$ENABLE_RRF" == "true" ]] && rrf_flag="--enable-rrf-baseline"
          python3 eval/bea4_external_scale_smoke.py \
            --enable-external-benchmark-network \
            --contextbench-row-offset "$CB_OFFSET" \
            --contextbench-row-limit "$CB_LIMIT" \
            --repoqa-needle-offset "$RQ_OFFSET" \
            --repoqa-needle-limit "$RQ_LIMIT" \
            --budget "$BUDGET" --methods "$METHODS" \
            $rrf_flag --openlocus target/release/openlocus \
            --out "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_ENV"

      - name: BEA-4 no-op when network not enabled
        if: ${{ steps.resolve.outputs.enable_network != 'true' }}
        run: echo "enable_external_benchmark_network is false; skipping real BEA-4 scale smoke."

      - name: Validate BEA-4 report (fail-closed)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        env:
          REPORT_PATH: ${{ env.report_path }}
        run: |
          python3 - <<'PY'
          import json, os, sys
          from collections import Counter
          path = os.environ["REPORT_PATH"]
          if not os.path.isfile(path):
              print("ERROR: report not found", file=sys.stderr); sys.exit(1)
          with open(path, encoding="utf-8") as f:
              report = json.load(f)
          must_be_true = {"aggregate_only_public_artifact", "diagnostic_only"}
          must_be_false = {
              "external_benchmark_performance_claimed", "leaderboard_entry_claimed",
              "downstream_agent_value_proven", "calibration_claimed",
              "method_winner_claimed", "promotion_ready", "default_should_change",
              "runtime_behavior_changed", "retriever_changed", "pack_builder_changed",
              "backend_changed", "default_policy_changed",
              "evidencecore_semantics_changed", "provider_calls_made",
              "remote_provider_calls_made",
              # BEA-4 binding: v0.3 algorithm/weights MUST NOT change during BEA-4.
              "algorithm_changed_during_bea4", "weights_tuned_during_bea4",
          }
          failures = []
          for flag in must_be_true:
              if report.get(flag) is not True:
                  failures.append(f"expected {flag}=true, got {report.get(flag)!r}")
          for flag in must_be_false:
              if report.get(flag) is not False:
                  failures.append(f"expected {flag}=false, got {report.get(flag)!r}")
          status = report.get("status")
          if status not in ("bea4_external_scale_smoke_pass", "partial"):
              failures.append(f"expected status pass/partial, got {status!r}")
          if report.get("forbidden_scan", {}).get("status") != "pass":
              failures.append("expected forbidden_scan.status=pass")
          if report.get("self_test_passed") is not True:
              failures.append("expected self_test_passed=true")
          # BEA-4 is a scale phase, not another local-smoke-sized CI run.
          # Smaller debug slices may be run locally, but must not pass this
          # network-enabled workflow or be recorded as BEA-4 scale evidence.
          if report.get("records_successful", 0) < 75:
              failures.append(f"expected records_successful >= 75 for BEA-4 scale CI, got {report.get('records_successful')!r}")
          if report.get("provider_calls") != 0:
              failures.append("expected provider_calls=0")
          manifest = report.get("private_score_manifest", {})
          if not isinstance(manifest, dict) or not manifest:
              failures.append("expected non-empty private_score_manifest")
          else:
              if manifest.get("path_publicly_serialized") is not False:
                  failures.append("expected path_publicly_serialized=false")
              if manifest.get("records_written") is not True:
                  failures.append("expected records_written=true")
          if report.get("schema_version") != "bea4_external_scale_smoke.v1":
              failures.append(f"unexpected schema_version: {report.get('schema_version')!r}")
          if report.get("claim_level") != "bea_v03_external_scale_smoke_only":
              failures.append(f"unexpected claim_level: {report.get('claim_level')!r}")
          if report.get("phase") != "BEA-4":
              failures.append(f"unexpected phase: {report.get('phase')!r}")
          if report.get("treatment_arm") != "bea_v0_3_anchor_span_latency":
              failures.append(f"unexpected treatment_arm: {report.get('treatment_arm')!r}")
          fixed_arms = report.get("fixed_arms", [])
          for expected in ("bea_v0_3_anchor_span_latency", "bea_v0_2_diversity_risk",
                           "bea_v0", "bm25_prefix_same_budget",
                           "agreement_only_same_budget", "rrf_same_budget",
                           "seeded_random_same_budget"):
              if expected not in fixed_arms:
                  failures.append(f"expected {expected} in fixed_arms")
          # Ablations MUST NOT be present.
          for ablation in ("bea_v0_3_no_anchor", "bea_v0_3_no_early_stop"):
              if ablation in fixed_arms:
                  failures.append(f"ablation {ablation} must not be in fixed_arms")
          for key in ("benchmark_arm_metric_records", "delta_records",
                      "win_tie_loss_records", "worst_slice_records",
                      "mechanism_summary_records"):
              if not isinstance(report.get(key), list):
                  failures.append(f"expected {key} to be a list")
          treatment_benchmark_counts = {}
          for rec in (report.get("benchmark_arm_metric_records") or []):
              if (rec.get("arm") == "bea_v0_3_anchor_span_latency"
                      and rec.get("metric") == "file_recall@10"):
                  treatment_benchmark_counts[rec.get("benchmark")] = rec.get("record_count", 0)
          for benchmark in ("contextbench", "repoqa"):
              if treatment_benchmark_counts.get(benchmark, 0) <= 0:
                  failures.append(f"expected nonzero BEA v0.3 records for benchmark {benchmark}")
          # No dynamic dict mirrors.
          for key in ("arm_metrics", "deltas", "aggregate_metrics",
                      "arm_metric_records"):
              if key in report:
                  failures.append(f"legacy {key} dict must not be present")
          bea4_forbidden = (
              "private_score_path", "action_order", "priority_components",
              "selected_decisions", "budget_trace", "stop_reason",
              "candidate_features", "anchor_eligibility",
              "anchor_slots", "early_stop_reason", "score_outcome",
              "winner", "best_method", "recommended_default",
              "method_winner", "calibration",
              "worst_slice_record_id", "slice_label", "slice_id",
              "worst_slice_label", "slice_record_ids", "slice_member_ids",
          )
          def find_keys(obj, keys, path="$"):
              found = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if k in keys: found.append(f"{path}.{k}")
                      found.extend(find_keys(v, keys, f"{path}.{k}"))
              elif isinstance(obj, list):
                  for idx, v in enumerate(obj):
                      found.extend(find_keys(v, keys, f"{path}[{idx}]"))
              return found
          leaked = find_keys(report, bea4_forbidden)
          if leaked:
              failures.append(f"forbidden fields present: {leaked}")
          # Required delta comparisons: v0.3 vs bm25, agreement, rrf, v0.2, v0, random.
          required_controls = {
              "bm25_prefix_same_budget", "agreement_only_same_budget",
              "rrf_same_budget", "bea_v0", "bea_v0_2_diversity_risk",
              "seeded_random_same_budget",
          }
          found_controls = {r["baseline_arm"] for r in (report.get("delta_records") or [])
                            if r.get("treatment_arm") == "bea_v0_3_anchor_span_latency"}
          missing = required_controls - found_controls
          if missing:
              failures.append(f"missing required delta controls: {sorted(missing)}")
          # Worst-slice records must use only fixed bucket labels.
          allowed_buckets = {
              "benchmark", "query_length_bucket", "candidate_pool_size_bucket",
              "budget_exhaustion_bucket", "file_kind_mix_bucket",
              "method_agreement_bucket", "rank_gap_bucket",
              "record_count", "file_recall@10", "mrr", "span_f0.5@10",
              "success_rate", "evidence_budget_used", "latency_seconds",
              "quality_per_candidate", "quality_per_latency", "arm",
          }
          for rec in (report.get("worst_slice_records") or []):
            for key in rec:
                if key not in allowed_buckets:
                    failures.append(f"worst_slice_records has unexpected key: {key!r}")
                    break
          # Private SCORE count must match records × arms.
          expected_count = report.get("records_successful", 0) * len(fixed_arms)
          if manifest.get("record_count") != expected_count:
              failures.append(
                  f"private_score_record_count={manifest.get('record_count')} != "
                  f"records_successful({report.get('records_successful')}) × "
                  f"fixed_arms({len(fixed_arms)})={expected_count}"
              )
          if failures:
              print("BEA-4 report validation FAILED:", file=sys.stderr)
              for f in failures: print(f"  - {f}", file=sys.stderr)
              sys.exit(1)
          print("BEA-4 report validation passed.")
          print(f"  status={status}")
          print(f"  records_successful={report.get('records_successful')}")
          print(f"  private_score_record_count={manifest.get('record_count')}")
          print(f"  benchmark_arm_metric_records={len(report.get('benchmark_arm_metric_records') or [])}")
          print(f"  delta_records={len(report.get('delta_records') or [])}")
          print(f"  win_tie_loss_records={len(report.get('win_tie_loss_records') or [])}")
          print(f"  worst_slice_records={len(report.get('worst_slice_records') or [])}")
          print(f"  mechanism_summary_records={len(report.get('mechanism_summary_records') or [])}")
          print(f"  algorithm_changed_during_bea4={report.get('algorithm_changed_during_bea4')}")
          print(f"  weights_tuned_during_bea4={report.get('weights_tuned_during_bea4')}")
          PY

      - name: Validate docs i18n mirror
        run: python3 scripts/validate_docs_i18n.py

      - name: Check working tree (no generated files committed)
        run: git diff --check

      - name: Upload BEA-4 aggregate report artifact (aggregate only)
        if: ${{ steps.resolve.outputs.enable_network == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: bea4-external-scale-smoke-report-${{ github.run_id }}
          path: ${{ env.report_path }}
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: false
