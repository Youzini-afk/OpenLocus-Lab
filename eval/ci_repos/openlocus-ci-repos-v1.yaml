# OpenLocus CI Public Corpus Manifest v1
#
# Migrated from ci-test/openlocus-ci-repos-v1.yaml with policy fixes:
#   - weekly_large no longer includes dense_real/quiver (R50: workflow_dispatch only, default disabled)
#   - nightly_medium now includes dense_mock
#   - Dual expected_license (MIT_OR_UNLICENSE, MIT_OR_APACHE) preserved without
#     weakening allowed single-license policy
#
schema_version: openlocus-ci-repos-v1
purpose: >
  Public GitHub repository pool for OpenLocus retrieval benchmarks. Repos are cloned in CI,
  locked by commit SHA, scanned, and used to auto-generate deterministic/mined/stress tasks.
  This manifest is a starting pool; CI must verify license, default branch, size, lock SHA, and
  file manifest before use.
policy:
  evidence_core_required: true
  run_phase_public_only: true
  score_phase_labels_only: true
  no_promotion_evidence_by_default: true
  clone_depth_default: 1
  fetch_history_depth_for_commit_tasks: 80
  max_matrix_jobs_per_workflow: 128
  max_job_minutes: 45
  artifact_retention_days: 7
  upload_raw_source_artifacts: false
  upload_evidence_excerpts: false
  upload_metrics_and_sanitized_examples_only: true
  allowed_licenses:
    - MIT
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - MPL-2.0
    - EPL-2.0
    - Unlicense
    - curl
  # Dual-license markers used in expected_license only (not standalone allowed values).
  # MIT_OR_UNLICENSE means the repo is dual-licensed under MIT OR Unlicense (either accepted).
  # MIT_OR_APACHE  means the repo is dual-licensed under MIT OR Apache-2.0 (either accepted).
  dual_license_markers:
    - MIT_OR_UNLICENSE
    - MIT_OR_APACHE
stages:
  pr_smoke:
    cadence: pull_request
    max_repos: 6
    max_tasks_per_repo: 60
    strategies: [regex, bm25, symbol, rrf, query_noise_plus_rrf_agree_min]
  nightly_medium:
    cadence: schedule_or_workflow_dispatch
    max_repos: 20
    max_tasks_per_repo: 180
    strategies: [regex, bm25, symbol, rrf, bm25_regex, bm25_symbol, rrf_guarded_by_symbol_regex, query_noise_plus_rrf_agree_min, ast_chunk_bm25, graph_basic, dense_mock]
  weekly_large:
    cadence: weekly_or_workflow_dispatch
    max_repos: 12
    max_tasks_per_repo: 300
    shard_count: 3
    # dense_real and quiver intentionally omitted: R50 defines them as workflow_dispatch only
    # with default disabled; they must not appear in scheduled weekly runs.
    strategies: [regex, bm25, symbol, rrf, bm25_regex, bm25_symbol, rrf_guarded_by_symbol_regex, query_noise_plus_rrf_agree_min, ast_chunk_bm25, graph_basic, dense_mock]
  manual_extreme:
    cadence: workflow_dispatch_only
    max_repos: 6
    max_tasks_per_repo: 500
    strategies: [regex, bm25, symbol, rrf, bm25_regex, bm25_symbol, rrf_guarded_by_symbol_regex, query_noise_plus_rrf_agree_min, ast_chunk_bm25, graph_basic, dense_mock, DenseReal, QuIVer]
repos:
