[index]
include = ["**/*"]
exclude = [".git/**", "target/**", "node_modules/**", "dist/**", ".env*", "**/*.pem"]
include_gitignored = false
index_generated = false

[remote]
allow = false
default_mode = "local_only"
allowed_providers = []
max_data_level = 0
allow_rerank = false
allow_embedding = false
allow_summary = false

[secrets]
scan_before_remote = true
block_on_match = true
redact = true

[retention]
local_index_ttl_days = 90
remote_cache = false
telemetry = false
